<title>FMDS OS — World Emblem</title>
<meta name="description" content="Agentic Data & Operations Platform — role-based operator console for World Emblem's FMDS management layer.">
<style>
/* ============================================================================
   FMDS OS — Design System  (R1 redesign: "Operations Console")
   A $150M Toyota-Lean manufacturer's operating layer for department leaders.
   DARK graphite command rail + LIGHT off-white work canvas. One electric-blue
   accent. RAG reserved strictly for status.

   Type: IBM Plex Sans (UI/body) + IBM Plex Mono (every metric / target / KPI
   value / KZ number / code) — loaded via <link> in index.html.

   NOTE: legacy token + class names (--slate-*, --accent, .card, .badge,
   .rag-chip--*, .btn--*, table styles) are KEPT and remapped so every existing
   board upgrades automatically.
   ========================================================================== */

:root {
  /* ── Command rail (dark graphite) ─────────────────────────────── */
  --ink-900: #0e1116;
  --ink-800: #161c24;
  --ink-700: #212a35;
  --ink-600: #2c3846;
  --rail-fg:        #aeb9c7;   /* muted rail text */
  --rail-fg-bright: #eef3f8;   /* bright rail text */
  --rail-line:      #232c38;   /* hairline on dark */

  /* ── Work canvas (light) ──────────────────────────────────────── */
  --canvas:  #f5f7fa;
  --surface: #ffffff;
  --surface-2: #fafbfc;
  --line:    #e3e8ef;          /* hairline border */
  --line-strong: #d3dae4;
  --text:       #0f151c;
  --text-muted: #59636f;

  /* ── Accent (one electric blue) ───────────────────────────────── */
  --accent:       #2f6bff;
  --accent-tint:  #eaf0ff;     /* soft accent bg */
  --accent-tint-2:#dbe6ff;
  --accent-hover: #1f57e6;

  /* ── RAG status (strict) ──────────────────────────────────────── */
  --green:  #1f9d57;
  --amber:  #e07a12;
  --red:    #d92d3a;
  --nodata: #98a2b3;
  --green-bg:  #e8f6ee;
  --amber-bg:  #fdf1e2;
  --red-bg:    #fdeaec;
  --nodata-bg: #eef1f5;
  --red-light: #f6c9cd;

  /* ── Legacy RAG aliases (KEEP — used as var(--rag-${rag}) etc.) ── */
  --rag-green:  var(--green);
  --rag-amber:  var(--amber);
  --rag-red:    var(--red);
  --rag-nodata: var(--nodata);
  --rag-green-bg:  var(--green-bg);
  --rag-amber-bg:  var(--amber-bg);
  --rag-red-bg:    var(--red-bg);
  --rag-nodata-bg: var(--nodata-bg);

  /* ── Legacy slate ramp (KEEP — retuned to the new palette) ─────── */
  --slate-50:  #f5f7fa;
  --slate-100: #eef1f5;
  --slate-200: #e3e8ef;
  --slate-300: #d3dae4;
  --slate-400: #b6c0cd;
  --slate-500: #8a95a3;
  --slate-600: #59636f;
  --slate-700: #37424e;
  --slate-800: #1b232d;
  --slate-900: #0f151c;

  /* Legacy accent aliases (KEEP) */
  --accent-light: var(--accent-tint);
  --accent-hover: var(--accent-hover);

  /* ── Typography ───────────────────────────────────────────────── */
  --font: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace, "SFMono-Regular", Menlo, Consolas, monospace;

  /* ── Spacing scale ────────────────────────────────────────────── */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px; --sp-12: 48px;

  /* ── Radius ───────────────────────────────────────────────────── */
  --radius-sm: 5px;
  --radius:    8px;      /* --r  */
  --radius-lg: 14px;     /* --r-lg */
  --r:    8px;
  --r-lg: 14px;

  /* ── Elevation (real shadows) ─────────────────────────────────── */
  --shadow-sm: 0 1px 2px rgba(15,21,28,0.05), 0 1px 1px rgba(15,21,28,0.04);
  --shadow:    0 2px 6px rgba(15,21,28,0.06), 0 4px 16px rgba(15,21,28,0.06);
  --shadow-lg: 0 8px 30px rgba(15,21,28,0.12);
  --shadow-rail: 2px 0 16px rgba(6,10,16,0.28);

  /* Motion */
  --ease: cubic-bezier(.2,.6,.2,1);
  --t-fast: 120ms;
  --t: 170ms;
}

/* ── Reset ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--canvas);
  font-feature-settings: "tnum" 1, "cv05" 1;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Everything numeric leans on tabular figures */
.text-mono, table td, .metric, [class*="kpi"] .text-mono {
  font-variant-numeric: tabular-nums;
}

/* ── Typography ─────────────────────────────────────────────────── */
h1 { font-size: 1.7rem;  font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
h2 { font-size: 1.2rem;  font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
h3 { font-size: 1rem;    font-weight: 600; color: var(--text); }
h4 { font-size: 0.875rem;font-weight: 600; color: var(--slate-700); }

p  { color: var(--slate-700); }
small { font-size: 0.75rem; color: var(--slate-600); }

a { color: var(--accent); text-decoration: none; transition: color var(--t-fast); }
a:hover { color: var(--accent-hover); }

/* ── Layout primitives ──────────────────────────────────────────── */
.container { max-width: 1280px; margin: 0 auto; padding: 0 var(--sp-6); }
.stack   { display: flex; flex-direction: column; }
.cluster { display: flex; flex-wrap: wrap; align-items: center; }
.grid    { display: grid; }
.gap-1 { gap: var(--sp-1); } .gap-2 { gap: var(--sp-2); } .gap-3 { gap: var(--sp-3); }
.gap-4 { gap: var(--sp-4); } .gap-6 { gap: var(--sp-6); }

/* ── Card ───────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: var(--sp-6);
  box-shadow: var(--shadow-sm);
}
.card--flat {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: var(--sp-4);
  box-shadow: none;
}

/* ── Table ──────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: var(--radius); }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

thead th {
  text-align: left;
  font-weight: 600;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  padding: var(--sp-3) var(--sp-3);
  border-bottom: 1px solid var(--line-strong);
  white-space: nowrap;
  background: var(--surface-2);
}

tbody td {
  padding: var(--sp-3);
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background var(--t-fast); }
tbody tr:hover { background: var(--accent-tint); }

/* ── RAG chips ──────────────────────────────────────────────────── */
.rag-chip {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-1);
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 600;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  transition: background var(--t-fast), color var(--t-fast);
  border: 1px solid transparent;
}
.rag-chip--green  { background: var(--green-bg);  color: var(--green);  border-color: rgba(31,157,87,.18); }
.rag-chip--amber  { background: var(--amber-bg);  color: var(--amber);  border-color: rgba(224,122,18,.18); }
.rag-chip--red    { background: var(--red-bg);    color: var(--red);    border-color: rgba(217,45,58,.18); }
.rag-chip--nodata { background: var(--nodata-bg); color: var(--nodata); border-color: var(--line); }

/* ── Badge ──────────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  background: var(--slate-100);
  color: var(--slate-700);
  border: 1px solid var(--line);
}
.badge--accent       { background: var(--accent-tint); color: var(--accent); border-color: var(--accent-tint-2); }
.badge--warning      { background: var(--amber-bg);    color: var(--amber);  border-color: rgba(224,122,18,.2); }
.badge--success      { background: var(--green-bg);    color: var(--green);  border-color: rgba(31,157,87,.2); }
.badge--info         { background: var(--accent-tint); color: var(--accent); border-color: var(--accent-tint-2); }
.badge--doc          { background: var(--surface-2);   color: var(--slate-600); border-color: var(--line); }
.badge--outline      { background: transparent;        color: var(--slate-600); border-color: var(--line-strong); }
.badge--illustrative { background: var(--accent-tint); color: var(--accent); border-color: var(--accent-tint-2); font-style: italic; }

/* ── Frozen banner (Finance Tier 3) ─────────────────────────────── */
.frozen-banner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; margin-bottom: 18px;
  background: var(--amber-bg);
  border: 1px solid rgba(224,122,18,.28);
  border-radius: var(--radius);
  font-size: 0.85rem; color: var(--amber);
}

/* ── Agent / Hermes note inline ─────────────────────────────────── */
.agent-note {
  padding: 8px 12px; margin-bottom: 12px;
  background: var(--accent-tint);
  border: 1px solid var(--accent-tint-2);
  border-radius: var(--radius);
  font-size: 0.8rem; color: var(--slate-700);
}

/* ── Button ─────────────────────────────────────────────────────── */
button, .btn {
  display: inline-flex; align-items: center; gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-4);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--slate-800);
  font-family: var(--font);
  font-size: 0.875rem; font-weight: 500;
  cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast), box-shadow var(--t-fast);
}
button:hover, .btn:hover { background: var(--slate-50); border-color: var(--slate-400); }

.btn--primary  { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn--primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); box-shadow: 0 2px 8px rgba(47,107,255,.28); }

.btn--ghost   { border-color: transparent; background: transparent; }
.btn--ghost:hover { background: var(--slate-100); }

.btn--outline { background: transparent; border-color: var(--line-strong); color: var(--slate-700); }
.btn--outline:hover { background: var(--slate-50); border-color: var(--accent); color: var(--accent); }

.btn--success { background: var(--green); border-color: var(--green); color: #fff; }
.btn--success:hover { background: #178a4a; border-color: #178a4a; }

/* ── Input ──────────────────────────────────────────────────────── */
input[type="text"], input[type="search"], select {
  padding: var(--sp-2) var(--sp-3);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 0.875rem;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
}
input[type="text"]:focus, input[type="search"]:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-tint);
}

/* ── Divider ────────────────────────────────────────────────────── */
.divider { border: none; border-top: 1px solid var(--line); margin: var(--sp-4) 0; }

/* ── Utility ────────────────────────────────────────────────────── */
.text-muted  { color: var(--text-muted); }
.text-small  { font-size: 0.75rem; }
.text-mono   { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.text-right  { text-align: right; }
.text-center { text-align: center; }

.mt-1 { margin-top: var(--sp-1); } .mt-2 { margin-top: var(--sp-2); }
.mt-3 { margin-top: var(--sp-3); } .mt-4 { margin-top: var(--sp-4); }
.mt-6 { margin-top: var(--sp-6); } .mt-8 { margin-top: var(--sp-8); }
.mb-2 { margin-bottom: var(--sp-2); } .mb-4 { margin-bottom: var(--sp-4); } .mb-6 { margin-bottom: var(--sp-6); }
.py-2 { padding-top: var(--sp-2); padding-bottom: var(--sp-2); }
.px-4 { padding-left: var(--sp-4); padding-right: var(--sp-4); }
.w-full { width: 100%; }
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

#app { min-height: 100vh; }

/* ============================================================================
   MOTION — staggered page-load reveal + metric roll-up
   ========================================================================== */
@keyframes fms-rise {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fms-fade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.reveal { animation: fms-rise var(--t) var(--ease) both; }
.reveal-1 { animation: fms-rise 260ms var(--ease) both; }
.reveal-2 { animation: fms-rise 260ms var(--ease) 60ms both; }
.reveal-3 { animation: fms-rise 260ms var(--ease) 120ms both; }
.reveal-4 { animation: fms-rise 260ms var(--ease) 180ms both; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

/* ============================================================================
   APP SHELL — dark command rail + light canvas
   ========================================================================== */
.app-shell { display: flex; min-height: 100vh; background: var(--canvas); }

/* ── Command rail (fixed dark) ──────────────────────────────────── */
.rail {
  width: 236px;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  background: linear-gradient(178deg, var(--ink-900), var(--ink-800));
  border-right: 1px solid var(--rail-line);
  box-shadow: var(--shadow-rail);
  display: flex;
  flex-direction: column;
  z-index: 40;
  color: var(--rail-fg);
}

.rail__brand {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 20px 18px;
  border-bottom: 1px solid var(--rail-line);
}
.rail__mark {
  width: 30px; height: 30px; border-radius: 8px;
  display: grid; place-items: center;
  background: linear-gradient(145deg, var(--accent), #6f97ff);
  color: #fff; font-weight: 700; font-size: 0.8rem;
  font-family: var(--font-mono);
  box-shadow: 0 2px 10px rgba(47,107,255,.5);
}
.rail__wordmark {
  font-weight: 600; font-size: 0.95rem; letter-spacing: -0.01em;
  color: var(--rail-fg-bright);
}
.rail__wordmark small {
  display: block; font-size: 0.6rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--rail-fg); font-weight: 500;
}

/* department context block */
.rail__context {
  padding: 16px 20px;
  border-bottom: 1px solid var(--rail-line);
}
.rail__ctx-label {
  font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: #6b7787; margin-bottom: 6px; font-weight: 600;
}
.rail__ctx-dept {
  font-size: 1.05rem; font-weight: 600; color: var(--rail-fg-bright);
  letter-spacing: -0.01em; line-height: 1.2;
}
.rail__ctx-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.rail__persona { font-size: 0.8rem; color: var(--rail-fg); }

.role-badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.02em;
  background: rgba(47,107,255,.18);
  color: #9dc0ff;
  border: 1px solid rgba(47,107,255,.35);
}
.role-badge--l1 { background: rgba(31,157,87,.16); color: #67d29a; border-color: rgba(31,157,87,.35); }

/* nav */
.rail__nav { flex: 1; overflow-y: auto; padding: 14px 12px; }
.rail__nav-label {
  font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: #63707f; padding: 0 10px 8px; font-weight: 600;
}
.rail-link {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 11px; margin-bottom: 2px;
  border-radius: var(--radius);
  font-size: 0.86rem; color: var(--rail-fg);
  text-decoration: none;
  transition: background var(--t-fast), color var(--t-fast);
  position: relative;
}
.rail-link:hover { background: rgba(255,255,255,.045); color: var(--rail-fg-bright); }
.rail-link--active {
  background: rgba(47,107,255,.14);
  color: var(--rail-fg-bright);
  font-weight: 600;
}
.rail-link--active::before {
  content: ""; position: absolute; left: -12px; top: 8px; bottom: 8px;
  width: 3px; border-radius: 0 3px 3px 0; background: var(--accent);
}
.rail-link__icon {
  width: 16px; text-align: center; flex-shrink: 0;
  font-size: 0.9rem; opacity: 0.85;
}

/* rail footer */
.rail__footer {
  padding: 14px 16px;
  border-top: 1px solid var(--rail-line);
}
.rail__footer-persona {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.rail__avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: grid; place-items: center; flex-shrink: 0;
  background: var(--ink-600); color: var(--rail-fg-bright);
  font-weight: 600; font-size: 0.72rem;
}
.rail__footer-meta { min-width: 0; }
.rail__footer-name { font-size: 0.8rem; color: var(--rail-fg-bright); font-weight: 500; }
.rail__footer-sub  { font-size: 0.66rem; color: #63707f; }
.rail__signout {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 8px; border-radius: var(--radius);
  background: transparent; border: 1px solid var(--rail-line);
  color: var(--rail-fg); font-size: 0.75rem; font-weight: 500;
  cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast), color var(--t-fast);
}
.rail__signout:hover { background: rgba(255,255,255,.05); color: var(--rail-fg-bright); border-color: var(--ink-600); }

/* ── Main column (offset by rail) ───────────────────────────────── */
.app-main {
  flex: 1; min-width: 0;
  margin-left: 236px;
  display: flex; flex-direction: column;
}

/* ── Top bar ────────────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 30;
  height: 56px;
  display: flex; align-items: center; gap: 16px;
  padding: 0 26px;
  background: rgba(255,255,255,.86);
  backdrop-filter: saturate(160%) blur(10px);
  border-bottom: 1px solid var(--line);
}
.crumb { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; min-width: 0; }
.crumb__dept { color: var(--text-muted); }
.crumb__sep  { color: var(--slate-400); }
.crumb__view { color: var(--text); font-weight: 600; }

.topbar__search {
  margin-left: auto;
  width: 200px; max-width: 30vw;
}
.topbar__search input { width: 100%; background: var(--canvas); font-size: 0.82rem; }

.rollup-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.72rem; color: var(--text-muted);
  padding: 5px 10px; border-radius: 999px;
  background: var(--canvas); border: 1px solid var(--line);
  white-space: nowrap;
}
.rollup-tag b { color: var(--slate-700); font-weight: 600; }

/* Chief-of-Staff inbox bell */
.inbox-btn {
  position: relative;
  width: 38px; height: 38px; padding: 0;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: var(--surface);
  display: grid; place-items: center;
  font-size: 1rem; cursor: pointer;
  transition: background var(--t-fast), border-color var(--t-fast);
}
.inbox-btn:hover { background: var(--slate-50); border-color: var(--slate-400); }
.inbox-btn__count {
  position: absolute; top: -6px; right: -6px;
  min-width: 17px; height: 17px; padding: 0 4px;
  border-radius: 999px; background: var(--accent); color: #fff;
  font-size: 0.62rem; font-weight: 700; line-height: 17px;
  text-align: center; font-variant-numeric: tabular-nums;
  box-shadow: 0 0 0 2px var(--surface);
}
.inbox-panel {
  position: absolute; top: 52px; right: 18px; z-index: 60;
  width: 320px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: fms-rise 160ms var(--ease) both;
}
.inbox-panel__head {
  padding: 13px 16px; border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}
.inbox-panel__title { font-size: 0.82rem; font-weight: 600; color: var(--text); }
.inbox-panel__sub   { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
.inbox-item {
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  display: flex; gap: 10px;
}
.inbox-item:last-child { border-bottom: none; }
.inbox-item__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
.inbox-item__body { font-size: 0.78rem; color: var(--slate-700); line-height: 1.45; }
.inbox-item__from { font-size: 0.68rem; color: var(--text-muted); margin-top: 3px; }

/* ── Canvas ─────────────────────────────────────────────────────── */
.canvas {
  flex: 1;
  padding: 28px 26px 56px;
  max-width: 1320px;
  width: 100%;
}
.view-mount { min-width: 0; }

/* ============================================================================
   LOGIN — full-screen branded operations console sign-in
   ========================================================================== */
.login {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  background: var(--ink-900);
}
.login__brandside {
  position: relative;
  padding: 56px;
  color: var(--rail-fg-bright);
  display: flex; flex-direction: column;
  background:
    radial-gradient(1200px 600px at -10% -10%, rgba(47,107,255,.22), transparent 60%),
    linear-gradient(160deg, var(--ink-900), var(--ink-800));
  overflow: hidden;
}
.login__brandside::after {
  content: ""; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
  background-size: 46px 46px;
  mask-image: radial-gradient(700px 500px at 30% 40%, #000, transparent 75%);
  pointer-events: none;
}
.login__brand {
  display: flex; align-items: center; gap: 12px; position: relative; z-index: 1;
}
.login__brand .rail__mark { width: 38px; height: 38px; font-size: 0.95rem; }
.login__brand-word { font-size: 1.15rem; font-weight: 600; color: var(--rail-fg-bright); }
.login__brand-word small { display: block; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--rail-fg); font-weight: 500; }

.login__lead {
  margin-top: auto; position: relative; z-index: 1; max-width: 460px;
}
.login__headline {
  font-size: 2rem; font-weight: 600; letter-spacing: -0.02em;
  color: var(--rail-fg-bright); line-height: 1.15;
}
.login__sub { margin-top: 14px; color: var(--rail-fg); font-size: 0.95rem; line-height: 1.6; }
.login__stats { display: flex; gap: 28px; margin-top: 30px; position: relative; z-index: 1; }
.login__stat-val {
  font-family: var(--font-mono); font-size: 1.5rem; font-weight: 600;
  color: var(--rail-fg-bright); font-variant-numeric: tabular-nums;
}
.login__stat-lbl { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: #6b7787; margin-top: 2px; }

.login__formside {
  background: var(--surface);
  display: flex; flex-direction: column; justify-content: center;
  padding: 56px min(9vw, 88px);
}
.login__form { width: 100%; max-width: 400px; margin: 0 auto; }
.login__form h1 { font-size: 1.45rem; }
.login__form-sub { color: var(--text-muted); margin-top: 6px; margin-bottom: 28px; font-size: 0.9rem; }

.login__field { margin-bottom: 22px; }
.login__field-label {
  display: block; font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 8px;
}
.login__select-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.opt-chip {
  padding: 9px 6px; border: 1px solid var(--line-strong);
  border-radius: var(--radius); background: var(--surface);
  font-size: 0.78rem; font-weight: 500; color: var(--slate-700);
  cursor: pointer; text-align: center;
  transition: all var(--t-fast) var(--ease);
}
.opt-chip:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.opt-chip--active {
  background: var(--accent-tint); border-color: var(--accent);
  color: var(--accent); font-weight: 600;
  box-shadow: 0 0 0 3px var(--accent-tint);
}
.opt-chip:disabled { opacity: .4; cursor: not-allowed; }

.role-grid { grid-template-columns: repeat(2, 1fr); }
.opt-chip--role {
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
  text-align: left; padding: 12px 14px;
}
.opt-chip--role .role-k { font-family: var(--font-mono); font-size: 0.82rem; font-weight: 600; }
.opt-chip--role .role-d { font-size: 0.68rem; color: var(--text-muted); font-weight: 400; }
.opt-chip--role.opt-chip--active .role-d { color: var(--accent); }

.login__persona-preview {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; margin-bottom: 22px;
  border: 1px dashed var(--line-strong); border-radius: var(--radius);
  background: var(--surface-2);
  min-height: 58px;
  transition: border-color var(--t-fast), background var(--t-fast);
}
.login__persona-preview--set { border-style: solid; border-color: var(--accent-tint-2); background: var(--accent-tint); }
.login__persona-avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center; font-weight: 600; font-size: 0.8rem;
  background: var(--accent); color: #fff;
}
.login__persona-empty { color: var(--text-muted); font-size: 0.82rem; }
.login__persona-name { font-weight: 600; font-size: 0.92rem; color: var(--text); }
.login__persona-role { font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-mono); }

.login__enter {
  width: 100%; justify-content: center;
  padding: 12px; font-size: 0.92rem; font-weight: 600;
}
.login__enter:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
.login__demo-note {
  margin-top: 16px; text-align: center;
  font-size: 0.72rem; color: var(--text-muted);
}

@media (max-width: 860px) {
  .login { grid-template-columns: 1fr; }
  .login__brandside { display: none; }
}

/* ============================================================================
   L1 — "My Day"
   ========================================================================== */
.myday__head { margin-bottom: 22px; }
.myday__greeting { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
.myday__date { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

.myday__hero {
  display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: center;
  padding: 22px 24px;
  border-radius: var(--radius-lg);
  background: linear-gradient(150deg, var(--ink-900), var(--ink-700));
  color: var(--rail-fg-bright);
  margin-bottom: 22px;
  box-shadow: var(--shadow);
}
.myday__hero-label { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: #8794a3; }
.myday__hero-kpi   { font-size: 1.05rem; font-weight: 600; margin-top: 4px; color: var(--rail-fg-bright); }
.myday__hero-val {
  font-family: var(--font-mono); font-size: 2.3rem; font-weight: 600;
  letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
  line-height: 1; margin-top: 8px;
}
.myday__hero-tgt { font-size: 0.78rem; color: #8794a3; margin-top: 8px; }
.myday__hero-tgt b { color: var(--rail-fg); font-family: var(--font-mono); }

.myday__grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.metric-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: 18px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--t), transform var(--t);
}
.metric-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.metric-card__top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.metric-card__name { font-size: 0.82rem; font-weight: 600; color: var(--slate-700); line-height: 1.35; }
.metric-card__val {
  font-family: var(--font-mono); font-size: 1.7rem; font-weight: 600;
  color: var(--text); letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
  margin-top: 12px; line-height: 1;
}
.metric-card__tgt {
  font-size: 0.72rem; color: var(--text-muted); margin-top: 6px;
  font-variant-numeric: tabular-nums;
}
.metric-card__tgt b { font-family: var(--font-mono); color: var(--slate-700); }
.metric-card__chart { margin-top: 12px; overflow: hidden; }

/* ============================================================================
   Team Board / KPI / My Board — existing view classes (inherit new tokens)
   ========================================================================== */
.team-board { }
.flag-icon { display: inline-block; font-size: 0.8rem; color: var(--amber); cursor: help; margin-left: 2px; }
.main-row--expandable { cursor: pointer; }
.main-row--expandable:hover > td:first-child { color: var(--accent); }
.contributor-row { background: var(--surface-2); }
.contributor-row td { font-size: 0.83rem; }

.kpi-layout { display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: flex-start; }
.kpi-list {
  border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 12px;
  background: var(--surface);
  position: sticky; top: 56px; max-height: calc(100vh - 56px); overflow-y: auto;
  box-shadow: var(--shadow-sm);
}
.kpi-group { margin-bottom: 16px; }
.kpi-group-label {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-muted); padding: 4px 8px; margin-bottom: 4px;
}
.kpi-list-item {
  display: flex; align-items: flex-start; gap: 8px; width: 100%;
  text-align: left; padding: 7px 8px; border: none; background: transparent;
  border-radius: var(--radius); font-size: 0.83rem; color: var(--slate-700);
  cursor: pointer; transition: background var(--t-fast); line-height: 1.35;
}
.kpi-list-item:hover { background: var(--slate-100); }
.kpi-list-item--active { background: var(--accent-tint); color: var(--accent); font-weight: 600; }
.kpi-detail { min-width: 0; }
.identity-card { padding: 24px; }
.identity-fields { display: flex; flex-direction: column; gap: 14px; }
.identity-field {
  display: grid; grid-template-columns: 160px 1fr; gap: 8px; align-items: flex-start;
  border-bottom: 1px solid var(--line); padding-bottom: 14px;
}
.identity-field:last-child { border-bottom: none; padding-bottom: 0; }
.identity-label {
  font-size: 0.73rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-muted); padding-top: 2px;
}

.rep-card { padding: 24px; }
.rep-selector { flex-wrap: wrap; }
.rep-subs { display: flex; flex-direction: column; gap: 12px; }
.rep-sub-row {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  padding: 10px; border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--surface-2);
}
.rep-sub-label { flex: 1; min-width: 0; }
.rep-sub-chart { flex-shrink: 0; overflow: hidden; }

/* ── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 1000px) {
  .rail { transform: none; }
  .kpi-layout { grid-template-columns: 1fr; }
  .kpi-list   { position: static; max-height: none; }
  .rep-sub-row { flex-direction: column; }
}
@media (max-width: 768px) {
  .container { padding: 0 var(--sp-4); }
  h1 { font-size: 1.4rem; }
  .identity-field { grid-template-columns: 1fr; }
  .app-main { margin-left: 0; }
  .rail { position: static; width: 100%; height: auto; }
  .app-shell { flex-direction: column; }
}

/* ─── Assistant drawer ─────────────────────────────────────────────────────── */
.assistant-drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 360px;
  background: var(--surface);
  border-left: 1px solid var(--line-strong);
  box-shadow: -4px 0 24px rgba(15,21,28,.12);
  z-index: 50;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.assistant-drawer__head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}
.assistant-drawer__title {
  font-size: 0.875rem; font-weight: 600; color: var(--text);
}
.assistant-drawer__dept {
  color: var(--accent);
}
.assistant-drawer__close {
  background: none; border: none; font-size: 1.25rem; cursor: pointer;
  color: var(--text-muted); padding: 0 4px; line-height: 1;
}
.assistant-drawer__close:hover { color: var(--text); }
.assistant-drawer__shortcuts {
  display: flex; flex-direction: column; gap: 8px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
}
.assistant-shortcut {
  background: var(--surface-2); border: 1px solid var(--line-strong);
  border-radius: var(--radius); padding: 8px 12px;
  font-size: 0.8rem; color: var(--text); cursor: pointer;
  text-align: left; transition: background var(--t-fast), border-color var(--t-fast);
}
.assistant-shortcut:hover { background: var(--accent-tint); border-color: var(--accent); color: var(--accent); }
.assistant-shortcut--poke { border-color: var(--amber); color: var(--amber); }
.assistant-shortcut--poke:hover { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
.assistant-drawer__reply {
  flex: 1; overflow-y: auto;
  padding: 16px 20px;
  font-size: 0.8rem; color: var(--text); line-height: 1.6;
  white-space: pre-wrap; font-family: var(--font-mono);
  background: var(--canvas);
}
.assistant-drawer__ask {
  display: flex; flex-direction: column; gap: 8px;
  padding: 16px 20px;
  border-top: 1px solid var(--line);
  background: var(--surface-2);
}
.assistant-drawer__ask textarea {
  resize: none; font-size: 0.82rem; padding: 8px 10px;
  border: 1px solid var(--line-strong); border-radius: var(--radius);
  background: var(--canvas); color: var(--text);
}
.assistant-drawer__ask textarea:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-tint);
}
.assistant-ask-btn { width: 100%; }
.topbar-btn {
  background: var(--surface-2); border: 1px solid var(--line-strong);
  border-radius: var(--radius); padding: 6px 12px;
  font-size: 0.8rem; font-weight: 500; color: var(--text-muted);
  cursor: pointer; white-space: nowrap;
  transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast);
}
.topbar-btn:hover { background: var(--accent-tint); color: var(--accent); border-color: var(--accent); }

/* ── Reason Log (R2: human context / reason capture) ───────────────────── */

/* Container that holds entries + inline form */
.reason-log {
  margin-top: var(--sp-3);
  border-top: 1px solid var(--line);
  padding-top: var(--sp-2);
}

.reason-log--hero {
  margin-top: var(--sp-4);
  padding-top: var(--sp-3);
}

/* Individual logged reason entry */
.reason-entry {
  border-left: 3px solid var(--line-strong);
  padding: var(--sp-2) var(--sp-3);
  margin-bottom: var(--sp-2);
  background: var(--surface-2);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  animation: fadeSlideIn 200ms var(--ease);
}

.reason-entry--red   { border-left-color: var(--red);   }
.reason-entry--amber { border-left-color: var(--amber); }
.reason-entry--green { border-left-color: var(--green); }

.reason-entry__meta {
  display: flex;
  gap: var(--sp-2);
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 2px;
}

.reason-entry__author { font-weight: 600; color: var(--text); }

.reason-entry__text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.45;
}

/* Inline log form */
.reason-log__form {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  margin-top: var(--sp-2);
}

.reason-log__input {
  width: 100%;
  resize: vertical;
  font-family: var(--font);
  font-size: 13px;
  padding: var(--sp-2) var(--sp-3);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  box-sizing: border-box;
}

.reason-log__input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-tint);
}

.reason-log__save {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 5px 14px;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 600;
  cursor: pointer;
  transition: background var(--t-fast) var(--ease);
}

.reason-log__save:hover { background: var(--accent-hover); }

/* btn--sm (used on Save buttons) */
.btn--sm {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
}

/* Completion line (green KPIs) */
.completion-line {
  margin-top: var(--sp-2);
  font-size: 12px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  border-top: 1px solid var(--green-bg);
  padding-top: var(--sp-2);
}

.completion-line .mono {
  font-family: var(--font-mono);
  font-size: 12px;
}

.completion-line__check {
  font-size: 13px;
  margin-right: 2px;
}

/* This week's context panel */
.week-context {
  margin-top: var(--sp-6);
  padding: var(--sp-4);
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

.week-context__head {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: var(--sp-3);
}

/* Animation for new reason entries */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── R3 Why Panel ─────────────────────────────────────────────────────────── */

.why-panel-row td { padding: 0 !important; }

.why-panel {
  background: var(--surface-2);
  border-top: 1px solid var(--line);
  border-bottom: 2px solid var(--line-strong);
  padding: 16px 24px 20px 48px;
  animation: fadeSlideIn 180ms var(--ease);
}

.why-panel__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.why-panel__title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.01em;
}

.why-panel__section {
  margin-top: 14px;
}

.why-panel__section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}

/* Contributors list */
.why-contributors {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.why-contributor {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  padding: 7px 10px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 13px;
}

.why-contributor__name {
  font-weight: 500;
  color: var(--text);
  min-width: 140px;
}

.why-contributor__metrics {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.why-mono {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text);
}

.why-mono--target { color: var(--text-muted); }

.why-vs {
  font-size: 11px;
  color: var(--text-muted);
}

/* Drag indicator */
.why-drag {
  font-size: 11px;
  font-weight: 600;
  padding: 1px 7px;
  border-radius: 3px;
  white-space: nowrap;
}

.why-drag--down    { background: var(--red-bg,  #fff1f2); color: var(--red);   }
.why-drag--up      { background: var(--green-bg, #f0fdf4); color: var(--green); }
.why-drag--neutral { background: var(--slate-100, #f1f5f9); color: var(--text-muted); }

/* Floor reason cards */
.why-floor {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.floor-reason {
  padding: 8px 12px;
  border-left: 3px solid var(--line-strong);
  background: var(--surface);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 13px;
  animation: fadeSlideIn 200ms var(--ease);
}

.floor-reason--red   { border-left-color: var(--red);   }
.floor-reason--amber { border-left-color: var(--amber); }
.floor-reason--green { border-left-color: var(--green); }
.floor-reason--nodata { border-left-color: var(--text-muted); }

.floor-reason__meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.floor-reason__author {
  font-weight: 600;
  font-size: 12px;
  color: var(--text);
}

.floor-reason__time {
  font-size: 11px;
  color: var(--text-muted);
}

.floor-reason__text {
  color: var(--text);
  line-height: 1.45;
}

/* Empty state */
.why-empty {
  font-size: 12px;
  color: var(--text-muted);
  margin: 4px 0 0;
  font-style: italic;
}

/* "Run 8-Step →" button in Why panel — reuses .btn .btn--ghost .btn--sm */
.why-solve-btn {
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  border-color: var(--accent);
  text-decoration: none;
  padding: 5px 12px;
  border-radius: var(--radius-sm);
}

.why-solve-btn:hover {
  background: var(--accent-light);
}

/* ============================================================================
   SOURCES VIEW — R4 "Where your numbers come from"
   ========================================================================== */

/* ── System badges in the summary header ──────────────────────────────────── */
.src-sys-badge {
  display: inline-flex; align-items: center;
  padding: 4px 10px;
  border-radius: var(--radius);
  font-size: 0.73rem; font-weight: 500;
  border: 1px solid var(--line-strong);
}
.src-sys-badge--pulled {
  background: var(--green-bg); color: var(--green);
  border-color: rgba(31,157,87,.22);
}
.src-sys-badge--manual {
  background: var(--amber-bg); color: var(--amber);
  border-color: rgba(224,122,18,.22);
}

/* ── Status pills (inline in cards and table) ─────────────────────────────── */
.src-pill {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 999px;
  font-size: 0.68rem; font-weight: 600; white-space: nowrap;
  border: 1px solid transparent;
}
.src-pill--pulled {
  background: var(--green-bg); color: var(--green);
  border-color: rgba(31,157,87,.18);
}
.src-pill--manual {
  background: var(--amber-bg); color: var(--amber);
  border-color: rgba(224,122,18,.18);
}

/* ── Source cards grid ────────────────────────────────────────────────────── */
.src-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.src-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  border-top-width: 3px;
}
.src-card--pulled { border-top-color: var(--green); }
.src-card--manual { border-top-color: var(--amber); }

.src-card__head {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 8px; margin-bottom: 12px;
}
.src-card__name {
  font-size: 0.8rem; font-weight: 600; color: var(--text); line-height: 1.3;
  word-break: break-word;
}
.src-card__count { font-size: 0.7rem; white-space: nowrap; flex-shrink: 0; }

.src-card__kpis { display: flex; flex-direction: column; gap: 6px; }
.src-card__kpi-row {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  padding: 5px 8px; border-radius: var(--radius-sm);
  background: var(--surface-2); border: 1px solid var(--line);
}
.src-card__kpi-name {
  flex: 1; min-width: 0;
  font-size: 0.78rem; color: var(--text); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.src-card__kpi-level { font-size: 0.65rem; white-space: nowrap; flex-shrink: 0; }

/* ── Per-KPI table ────────────────────────────────────────────────────────── */
.src-table { width: 100%; }
.src-table-kpi-name { font-weight: 500; font-size: 0.83rem; }
.src-table-flag {
  font-size: 0.7rem; color: var(--amber); font-weight: 600; white-space: nowrap;
}
.src-table-ok {
  font-size: 0.7rem; color: var(--green); font-weight: 600; white-space: nowrap;
}

/* ── Flow line card ───────────────────────────────────────────────────────── */
.src-flow { padding: 20px 24px; }
.src-flow__head {
  font-size: 0.78rem; font-weight: 700; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 18px;
}
.src-flow__diagram {
  display: flex; align-items: center; gap: 0; flex-wrap: wrap;
  margin-bottom: 16px;
}
.src-flow__node {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 20px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: var(--surface-2);
  text-align: center; min-width: 130px;
}
.src-flow__node--source { border-color: var(--accent-tint-2); background: var(--accent-tint); }
.src-flow__node--vault  { border-color: var(--line-strong); background: var(--surface); }
.src-flow__node--board  { border-color: rgba(31,157,87,.22); background: var(--green-bg); }
.src-flow__node-icon    { font-size: 1.2rem; }
.src-flow__node-label   { font-size: 0.78rem; font-weight: 600; color: var(--text); }
.src-flow__node-sub     { font-size: 0.65rem; color: var(--text-muted); }
.src-flow__arrow {
  font-size: 1.3rem; color: var(--slate-400); padding: 0 12px; flex-shrink: 0;

.src-flow__note { margin-bottom: 12px; line-height: 1.5; }

.src-flow-flag {
  display: flex; align-items: flex-start; gap: 10px;

.src-flow-flag--ok {

.cmt-thread--amber { border-top-color: rgba(224,122,18,.35); }

.cmt-toggle:hover { color: var(--accent); }
.cmt-body { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }

.cmt { display: flex; gap: 8px; align-items: flex-start; }
.cmt__avatar {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;

.cmt__avatar--human { background: var(--slate-500); }
.cmt__body { flex: 1; min-width: 0; }
.cmt__meta { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
.cmt__author { font-size: 0.7rem; font-weight: 700; color: var(--slate-700); }

.cmt__kind--action  { background: #fef3c7; color: #92400e; }

.cmt--lead .cmt__text { color: var(--slate-800); }
.cmt--ai .cmt__body {

.cmt--lead .cmt__body { background: var(--accent-tint); }
.cmt-empty { font-size: 0.72rem; color: var(--slate-400); padding: 2px 0 2px 30px; }

.cmt-form { display: flex; gap: 6px; align-items: flex-end; margin-top: 2px; }
.cmt-input {
  flex: 1; resize: vertical; min-height: 34px;
  font-size: 0.76rem; font-family: inherit; padding: 6px 8px; line-height: 1.4;

  background: #fff; color: var(--text);

  font-size: 0.72rem; font-weight: 600; padding: 7px 12px;

Color & Similar Programs)", "deptId": "operations", "docType": "BWI", "purpose": "To define the correct short-code selection and order-entry process for remake jobs (including high-volume programs such as Galls color), preventing the standard-work breakage that produces preventable credits and inflates OTP denominators.", "scope": "All Operations order-entry staff and plant leads (Mexico, Norcross, Houston, Canada) processing remake orders under short-code routing. Applies whenever a job is designated a remake and must be re-entered under a distinct order type.", "linkedForms": ["WMS SW Update Requests (SharePoint)", "OTP Tracker (COO Board)", "KZ tracker \u2014 Pricing Credit Memos (KZ-346)"], "note": "This SOP represents the standard-work gap identified in the T3 OTP story (Jun 24 review): a $40K breakage event where the wrong short-code was applied to a Galls color remake run, causing preventable credits and inflating the OTP denominator. Jim Kozel's question: 'I want to see what part of the standard work broke.' This BWI documents the corrected process. Values are real (OTP target 0.985; Mexico Mar 0.750; Galls color backlog 1,917 samples).", "steps": [{"n": 1, "mainStep": "Identify the job type before entering the order", "keyPoints": "Check whether the job is a first-run or a remake. For remake jobs, the short-code is different from the standard production code. Do not assume \u2014 verify against the original order number.", "reason": "Applying the wrong short-code routes the job incorrectly in WPS, assigns incorrect material costs, and causes a credit memo when the billing hits NetSuite. Each credit is tracked on the OTP board (Materials $/Revenue and Back Credits KPIs). The Feb\u2013Mar 2026 Galls color spike generated ~$40K in preventable credits from this error."}, {"n": 2, "mainStep": "Look up the correct short-code for the program in the WMS code table", "keyPoints": "Open WMS \u2192 Order Entry \u2192 Short-Code Reference Table. Match the program name (e.g. 'Galls Color', 'Embroidery Remake') to its designated remake code. The remake code is never the same as the first-run code for the same program.", "reason": "The Short-Code Reference Table is the single source of truth for routing. Using a memorized or guessed code is the key point that 'makes or breaks' this step \u2014 it is the root cause in KZ-346 (Pricing Credit Memos Feb '26)."}, {"n": 3, "mainStep": "Enter the order using the verified remake short-code", "keyPoints": "Confirm: short-code field matches the reference table entry; original order number is linked in the 'Source Order' field; job is flagged as REMAKE in the work-order header. Do not proceed if any of these three are missing.", "reason": "The 'REMAKE' flag triggers the correct floor routing so the plant team knows this is a rework job \u2014 prevents double-counting in the OTP denominator (a remake that is then tracked as a new job inflates the denominator, worsening the OTP percentage even if the plant delivers on time)."}, {"n": 4, "mainStep": "Verify the order before releasing to the floor", "keyPoints": "Two-person check: the entering clerk and the plant supervisor both confirm the short-code and REMAKE flag before releasing. For high-volume programs (>500 units), the lead must also approve.", "reason": "The Galls color backlog reached 1,917 samples in part because a batch of incorrectly coded orders was released and only caught at billing. A pre-release two-person check for high-volume programs stops the error before it compounds. Quality check at the point of occurrence."}, {"n": 5, "mainStep": "Log the remake in the OTP tracker at the start of the week", "keyPoints": "Add the remake job count to the weekly OTP tracker (COO Board denominator column) immediately when the order is released. Do not wait until week-end.", "reason": "Mexico OTP ran 0.39\u20130.55 weekly (weeks 15\u201323) in part because the denominator was inflated by unreported sample-surge volumes. Timely logging gives Jim and the plant lead visibility to the true denominator before the week closes, allowing early escalation."}, {"n": 6, "mainStep": "If a credit is required, initiate the KZ process", "keyPoints": "Any preventable credit (Standard = $0) triggers an 8-Step Problem Solving entry. Log in the KZ Tracker (Operations tab). Assign an owner and start date. Do not absorb credits silently.", "reason": "Preventable credits are a system signal, not a one-off. KZ-346 (Pricing Credit Memos) and KZ-339 (Credit and Rebill) both started with credits that were initially absorbed. The 8-step is how the plant confirms root cause and updates this standard work (Step 8 Yokoten)."}], "revisions": [{"date": "2026-07-01", "revision": "01", "description": "Original document \u2014 drafted from T3 OTP story (Jun 24) and KZ-346 Pricing Credit Memos discovery. Captures the short-code standard-work breakage root cause identified by Jim Kozel.", "requester": "Supernal / FMDS OS build"}], "elaborated": "Supernal", "revised": null, "approved": null}, "data/sops/service-prospecting.json": {"id": "service-prospecting", "title": "Service Prospecting \u2014 WEI & HP Outbound Call Process", "deptId": "service", "docType": "BWI", "purpose": "To standardize the prospecting and outbound-call workflow for Service reps managing WEI and Hero's Pride accounts, ensuring consistent follow-through from initial outreach to opportunity creation.", "scope": "All Service reps on Team JC and Team Noel handling WEI outbound calls, HP New Quotes, and WEI New Opportunity tracking.", "linkedForms": ["HubSpot New Opportunity form", "HP New Quote submission (NetSuite)", "WMS SW Update Requests"], "note": "This SOP is structured from the BWI format discovered in WE standard-work artifacts. The prospecting process and activity targets are drawn from the Service board (weekly targets: # Calls 251/wk, # WEI New Opps 48/wk, # HP New Quotes 10/wk per rep). Time-with-customer is flagged as a fast-follow metric gap \u2014 calls and meetings are current proxies.", "steps": [{"n": 1, "mainStep": "Prepare your weekly target list", "keyPoints": "Pull your assigned accounts from HubSpot; confirm your WEI revenue target (e.g. Diane 26,960/wk, Cullen 20,358/wk, Dylan 25,377/wk, Colten 18,883/wk); note any open opportunities from prior week.", "reason": "Ensures every rep starts the week with a clear, prioritized call list aligned to the weekly board targets \u2014 reduces wasted outreach and ensures on-target revenue pacing."}, {"n": 2, "mainStep": "Log each outbound call in HubSpot immediately after completion", "keyPoints": "Record call disposition (reached / voicemail / no answer); note outcome in contact record; if an opportunity surface \u2014 open a WEI New Opp immediately.", "reason": "# Calls is a board-tracked KPI (target 251/wk all reps). Unlogged calls create a gap between real activity and the FMDS board actuals, making the data unreliable. Immediate logging prevents end-of-week re-keying errors."}, {"n": 3, "mainStep": "Create a WEI New Opportunity when a prospect signals intent", "keyPoints": "Open the HubSpot Opportunity record on the call (do not wait); set estimated close date and value; link to the account; tag as WEI.", "reason": "# WEI New Opps (target 48/wk board-level) is a leading indicator for Incoming Revenue WE. Delayed entry overstates open-quote lag and distorts the pipeline view for the L2 leader."}, {"n": 4, "mainStep": "Submit HP New Quotes via NetSuite same day", "keyPoints": "HP New Quote target is 10/wk per rep (Diane baseline). Quote must include pricing, artwork spec, and ship-to before submission. Route to HP processing queue.", "reason": "HP Quotes are a separate revenue stream (Incoming Rev HPI target 36,755/wk). Late or incomplete quotes create the HP pipeline gap flagged in the KZ-303 (HP Quote-to-Order shortfall $80,859)."}, {"n": 5, "mainStep": "Apply the 3-Touch Rule for open WEI Opportunities over 14 days", "keyPoints": "Touch 1: email with value summary.               ${cols.map(c => `<th title="0 worst · 2 best" class="score-th">${esc(c.label)}</th>`).join('')}
            </tr>
          </thead>
          <tbody id="cm-matrix-body">${body}</tbody>
        </table>
      </div>
      <div style="font-size:0.75rem;color:var(--slate-500);margin-top:8px">
        Score each 0 (worst) · 1 · 2 (best). <b>Overall</b> = ranked priority, not a sum. Build consensus first (Nemawashi).
      </div>
      <button class="btn btn--outline" style="margin-top:8px;font-size:0.8rem" onclick="window._psAddCmRow()">+ Add Countermeasure</button>
    </div>`;
}

// ─── Action register + ODG gate (Step 6) ──────────────────────────────────────

function renderActionRegister(draft) {
  const statusColors = { R: 'var(--red)', Y: 'var(--amber)', G: 'var(--green)', C: 'var(--accent)' };
  const statusLabels = { R: 'Behind', Y: 'At Risk', G: 'On Track', C: 'Completed' };

  const savedRows = (_stepData[6] && _stepData[6].actionRows)
    || (draft && draft.actionRows)
    || Array.from({ length: 3 }, (_, i) => ({ no: i + 1, plan: '', startDate: '', dueDate: '', responsible: '', status: 'R' }));

  const rows = savedRows.map((row, i) => `
    <tr>
      <td class="text-center text-mono" style="width:40px">${row.no || i + 1}</td>
      <td><input type="text" class="form-input" data-ar-field="plan" data-ar-row="${i}" value="${esc(row.plan)}" placeholder="What needs to be done"></td>
      <td><input type="date" class="form-input" data-ar-field="startDate" data-ar-row="${i}" value="${esc(row.startDate)}" style="min-width:120px"></td>
      <td><input type="date" class="form-input" data-ar-field="dueDate" data-ar-row="${i}" value="${esc(row.dueDate)}" style="min-width:120px"></td>
      <td><input type="text" class="form-input" data-ar-field="responsible" data-ar-row="${i}" value="${esc(row.responsible)}" placeholder="Name"></td>
      <td>
        <select class="form-input" data-ar-field="status" data-ar-row="${i}" style="min-width:90px">
          ${Object.keys(statusColors).map(s =>
            `<option value="${s}" ${row.status === s ? 'selected' : ''}>${s} — ${statusLabels[s]}</option>`).join('')}
        </select>
      </td>
    </tr>`).join('');

  const legend = Object.entries(statusLabels).map(([k, v]) =>
    `<span style="color:${statusColors[k]};font-weight:600">${k}</span>=<span style="color:var(--slate-600)">${v}</span>`).join(' · ');

  const gate = (_stepData[6] && _stepData[6].odgGate) || (draft && draft.odgGate) || { status: 'pending', reviewer: 'Eric / Allison (ODG)' };
  const gateBadge = {
    pending:  '<span class="gate-badge gate-badge--pending">Not yet submitted</span>',
    submitted:'<span class="gate-badge gate-badge--submitted">Submitted — awaiting ODG</span>',
    approved: '<span class="gate-badge gate-badge--approved">✓ ODG approved</span>'
  }[gate.status] || '';

  return `
    <div>
      <div style="overflow-x:auto">
        <table class="kpi-table" style="width:100%;font-size:0.85rem">
          <thead>
            <tr>
              <th style="width:40px">No.</th><th>Implementation Plan</th><th>Start</th><th>Due</th><th>Responsible</th><th>Status</th>
            </tr>
          </thead>
          <tbody id="action-register-body">${rows}</tbody>
        </table>
      </div>
      <div style="font-size:0.75rem;color:var(--slate-500);margin-top:8px">Status: ${legend}</div>
      <button class="btn btn--outline" style="margin-top:8px;font-size:0.8rem" onclick="window._psAddActionRow()">+ Add Row</button>

      <div class="odg-gate">
        <div class="odg-gate__left">
          <div class="odg-gate__label">ODG Gate — Step 6</div>
          <div class="odg-gate__desc">Countermeasure plan must be reviewed by ${esc(gate.reviewer)} before implementation. ${gateBadge}</div>
        </div>
        <button class="btn ${gate.status === 'approved' ? 'btn--success' : 'btn--primary'}"
          onclick="window._psSubmitOdg()" ${gate.status === 'approved' ? 'disabled' : ''}>
          ${gate.status === 'approved' ? 'Approved' : gate.status === 'submitted' ? 'Mark ODG-approved' : 'Submit to ODG for gate review'}
        </button>
      </div>
    </div>`;
}

// ─── Results (Step 7) ─────────────────────────────────────────────────────────

function renderResults(stepDef, kpi) {
  const saved = _stepData[7] || {};
  const seed = {
    kpi: kpi ? kpi.name : '',
    measurementStart: kpi ? `${formatVal(kpi.actual, kpi.unit)} (baseline)` : '',
    newTarget: kpi ? `${formatVal(kpi.target, kpi.unit)}` : ''
  };
  return stepDef.fields.map(f => {
    if (f.key === 'chart') {
      return `<div class="form-group"><label class="form-label">${esc(f.label)}</label>
        <div class="chart-placeholder">Actual-vs-target chart — attach on close.</div></div>`;
    }
    const val = saved[f.key] != null ? saved[f.key] : (seed[f.key] || '');
    const isLong = f.key === 'narrative';
    const input = isLong
      ? `<textarea class="form-input" data-field="${f.key}" rows="4" placeholder="${esc(f.hint)}">${esc(val)}</textarea>`
      : `<input type="text" class="form-input" data-field="${f.key}" placeholder="${esc(f.hint)}" value="${esc(val)}">`;
    return `<div class="form-group"><label class="form-label">${esc(f.label)}</label>${input}</div>`;
  }).join('');
}

// ─── Standardize + SOP write-back (Step 8) ─────────────────────────────────────

function renderStandardize(stepDef, dept) {
  const saved = _stepData[8] || {};
  const fields = stepDef.fields.map(f => {
    if (f.key === 'improvementImage') {
      return `<div class="form-group"><label class="form-label">${esc(f.label)}</label>
        <div class="chart-placeholder">Before/after visual — attach.</div></div>`;
    }
    const val = saved[f.key] || '';
    return `<div class="form-group"><label class="form-label">${esc(f.label)}</label>
      <textarea class="form-input" data-field="${f.key}" rows="2" placeholder="${esc(f.hint)}">${esc(val)}</textarea></div>`;
  }).join('');

  const sop = govSop(dept);
  const sopTitle = sop.title || 'the governing Standard Work';
  const writeBackBtn = _sopWrittenBack
    ? `<span class="badge badge--success" style="font-size:0.8rem">✓ Standard Work updated — written back to SOP library</span>`
    : `<button class="btn btn--primary" onclick="window._psWriteBackSop()">Update Standard Work → write back to SOP library</button>`;

  return `
    ${fields}
    <div class="sop-writeback">
      <div class="sop-writeback__label">SOP Write-Back (Yokoten)</div>
      <div style="font-weight:600;font-size:0.95rem;margin:2px 0 4px">${esc(sopTitle)}</div>
      <p class="text-muted" style="margin:0 0 10px;font-size:0.8rem">
        SOPs are the <b>input</b> to Steps 1–5 and the <b>output</b> of Step 8. Locking in the countermeasure updates the standard work so the problem does not recur, and Yokoten shares it to other locations.
      </p>
      ${writeBackBtn}
      <a href="#/dept/${esc(dept.id)}/sop" style="display:inline-block;margin-left:12px;font-size:0.85rem;color:var(--accent)">Open Standard Work view →</a>
    </div>`;
}

// ─── Wizard step page ─────────────────────────────────────────────────────────

function renderWizardStep(dept, kpi, stepN, template) {
  const stepDef = template.steps[stepN - 1];
  if (!stepDef) return `<p class="text-muted">Step ${stepN} not found in template.</p>`;

  const kzNum = _activeKZ.kzNumber;
  const pdca  = stepDef.pdca;

  // Build the structured draft for this step (steps 1–6 only).
  const prior = _activeKZ._prior || null;
  const sop   = _activeKZ._sop || null;
  const draft = AI_STEPS.includes(stepN)
    ? draftStep(dept.id, stepN, {
        kpi: kpi?.name, kpiActual: kpi?.actual ?? null, kpiTarget: kpi?.target ?? null,
        kpiUnit: kpi?.unit, priorKZ: prior, sop
      })
    : null;

  const thread = renderGoldenThread(dept, kpi);
  const pdcaBadge = `<span class="pdca-badge" style="background:${pdcaColor(pdca)}">${pdca}</span>`;

  // AI pre-solve progress indicator (separate surface from the docked drawer).
  const solvedCount = AI_STEPS.filter(n => !!_activeKZ.steps[String(n)] || (draft && draft.prefilled && n === stepN)).length;
  const aiConfirmed = AI_STEPS.filter(n => !!_activeKZ.steps[String(n)]).length;
  const presolveBar = `
    <div class="presolve">
      <div class="presolve__text">
        <span class="presolve__dot">◆</span>
        AI pre-solved <b>${AI_STEPS.length} of 6</b> planning steps — you review &amp; finish.
        <span class="text-muted">${aiConfirmed}/6 confirmed so far.</span>
      </div>
      <div class="presolve__track">
        ${AI_STEPS.map(n => {
          const done = !!_activeKZ.steps[String(n)];
          return `<span class="presolve__seg ${done ? 'presolve__seg--done' : 'presolve__seg--ai'}" title="Step ${n}"></span>`;
        }).join('')}
      </div>
    </div>`;

  // Step-specific body
  let bodyContent = '';
  if (stepN === 4)      bodyContent = render5Whys6M(stepDef, draft);
  else if (stepN === 5) bodyContent = renderScoringMatrix(draft);
  else if (stepN === 6) bodyContent = renderActionRegister(draft);
  else if (stepN === 7) bodyContent = renderResults(stepDef, kpi);
  else if (stepN === 8) bodyContent = renderStandardize(stepDef, dept);
  else                  bodyContent = renderPrefillFields(stepDef, stepN, draft);

  const draftHeader = AI_STEPS.includes(stepN) ? draftBlock(draft, dept.id, stepN) : '';

  const prevBtn = stepN > 1
    ? `<button class="btn btn--outline" onclick="window._psGotoStep(${stepN - 1})">← Previous</button>` : '<span></span>';
  const nextBtn = stepN < 8
    ? `<button class="btn btn--primary" onclick="window._psConfirmStep(${stepN})">Confirm &amp; Next →</button>`
    : `<button class="btn btn--success" onclick="window._psConfirmStep(${stepN})">Confirm Step 8 — Close KZ</button>`;

  return `
    <div class="wizard-panel" data-step="${stepN}">
      ${presolveBar}
      ${thread}

      <div class="wizard-header">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            ${pdcaBadge}
            <span class="text-muted" style="font-size:0.8rem">Step ${stepN} of 8${stepDef.highLeverage ? ' · highest-leverage' : ''}</span>
          </div>
          <h3 style="margin:0;font-size:1.1rem">Step ${stepN}: ${esc(stepDef.name)}</h3>
          <p class="text-muted" style="margin:4px 0 0;font-size:0.85rem">${esc(stepDef.description)}</p>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="text-mono text-muted" style="font-size:0.75rem">${esc(kzNum)}</div>
          <div class="step-dots" style="display:flex;gap:4px;margin-top:6px">
            ${stepDotStrip(_activeKZ, true, stepN)}
          </div>
        </div>
      </div>

      ${draftHeader}

      <div class="wizard-fields">${bodyContent}</div>

      <div class="wizard-nav">
        ${prevBtn}
        <div style="display:flex;gap:8px">${nextBtn}</div>
      </div>
    </div>`;
}

// ─── Read-view: full completed A3 ─────────────────────────────────────────────

function scoreBadge(v) {
  if (v == null) return '<span class="sc sc--na">–</span>';
  return `<span class="sc sc--${v}">${v}</span>`;
}

function renderReadA3(kz, dept, template) {
  const c = kz.content || {};
  const h = c.header || {};
  const cats = (template && template.scoringMatrix && template.scoringMatrix.columns) || [];

  const whysHtml = (c.step4 && c.step4.whys || []).map(w => `
    <div class="ro-why">
      <span class="ro-why__n">Why ${w.n}</span>
      <span class="ro-why__cat">${esc(w.category)}</span>
      <span class="ro-why__t">${esc(w.text)}</span>
    </div>`).join('');

  const altChains = (c.step4 && c.step4.altChains || []).map(ch => `
    <div class="ro-altchain">
      <div class="text-muted" style="font-size:0.72rem;font-weight:700">${esc(ch.label)}</div>
      ${ch.whys.map((t, i) => `<div class="ro-alt-why">Why ${i + 1}: ${esc(t)}</div>`).join('')}
      <div class="ro-alt-root">Root: ${esc(ch.rootCause)}</div>
    </div>`).join('');

  const cmRows = (c.step5 && c.step5.countermeasures || []).map(cm => `
    <tr>
      <td class="cm-text">${esc(cm.text)}</td>
      ${cats.map(col => `<td class="score-cell">${scoreBadge(cm[col.key])}</td>`).join('')}
    </tr>`).join('');

  const arRows = (c.step6 && c.step6.actionRows || []).map(r => `
    <tr>
      <td class="text-center text-mono">${r.no}</td>
      <td>${esc(r.plan)}</td>
      <td class="text-muted">${esc(r.startDate)}</td>
      <td class="text-muted">${esc(r.dueDate)}</td>
      <td>${esc(r.responsible)}</td>
      <td><span class="ar-status ar-status--${r.status}">${esc(r.status)}</span></td>
    </tr>`).join('');

  const gate = (c.step6 && c.step6.odgGate) || {};
  const gateBadge = gate.status === 'approved'
    ? '<span class="gate-badge gate-badge--approved">✓ ODG approved</span>'
    : gate.status === 'pending'
      ? '<span class="gate-badge gate-badge--pending">ODG gate pending</span>' : '';

  const sopLink = (c.step8 && c.step8.sopLink) || {};
  const stepCard = (n, pdca, title, inner) => `
    <div class="ro-step">
      <div class="ro-step__head">
        <span class="pdca-badge" style="background:${pdcaColor(pdca)}">${pdca}</span>
        <span class="ro-step__n">Step ${n}</span>
        <span class="ro-step__title">${esc(title)}</span>
      </div>
      <div class="ro-step__body">${inner}</div>
    </div>`;

  const kv = (label, val) => `<div class="ro-kv"><span class="ro-kv__k">${esc(label)}</span><span class="ro-kv__v">${esc(val)}</span></div>`;

  return `
    <div class="ro-a3">
      <div style="margin-bottom:14px">
        <button class="btn btn--outline" onclick="window._psCloseRead()" style="font-size:0.8rem">← Back to tracker</button>
      </div>

      <div class="ro-header">
        <div>
          <div class="ro-header__title">${esc(kz.title)} <span class="a3-tag">A3</span></div>
          <div class="text-mono text-muted" style="font-size:0.8rem">${esc(kz.kzNumber)} · ${esc(dept.name)}${h.lang ? ' · ' + esc(h.lang) : ''}</div>
        </div>
        <div class="ro-header__meta">
          ${kv('Sponsor', h.sponsor || '—')}
          ${kv('Leader', h.leader || '—')}
          ${kv('Team', h.team || '—')}
          ${kv('Rev Date', h.revDate || '—')}
        </div>
      </div>
      <div class="step-dots" style="display:flex;gap:4px;margin:12px 0 18px">${stepDotStrip(kz)}</div>

      ${stepCard(1, 'PLAN', 'Clarify the Problem', `
        ${kv('Ultimate Goal', c.step1?.ultimateGoal)}
        ${kv('Standard', c.step1?.standard)}
        ${kv('Current Situation', c.step1?.current)}
        <div class="ro-gap">Gap = Problem: <b>${esc(c.step1?.gap)}</b></div>`)}

      ${stepCard(2, 'PLAN', 'Break Down the Problem', `
        ${c.step2?.note ? `<p class="text-muted" style="font-size:0.8rem;margin:0 0 6px">${esc(c.step2.note)}</p>` : ''}
        <div class="ro-prio">Prioritized problem: <b>${esc(c.step2?.prioritizedProblem)}</b></div>`)}

      ${stepCard(3, 'PLAN', 'Objective', `
        ${kv('Do What', c.step3?.doWhat)}
        ${kv('To What', c.step3?.toWhat)}
        ${kv('By When', c.step3?.byWhen)}`)}

      ${stepCard(4, 'PLAN', 'Root Cause (5-Whys + 6M)', `
        <div class="ro-whys">${whysHtml}</div>
        <div class="ro-rootcause">Root Cause: <b>${esc(c.step4?.rootCause)}</b></div>
        ${altChains ? `<div class="ro-altchains"><div class="text-muted" style="font-size:0.72rem;margin:8px 0 4px">Additional 5-Why chains iterated by the team:</div>${altChains}</div>` : ''}`)}

      ${stepCard(5, 'PLAN', 'Countermeasures (scored)', `
        <div style="overflow-x:auto"><table class="kpi-table cm-matrix">
          <thead><tr><th style="min-width:220px">Countermeasure</th>${cats.map(col => `<th class="score-th" title="${esc(col.label)}">${esc(col.label).slice(0, 4)}</th>`).join('')}</tr></thead>
          <tbody>${cmRows}</tbody>
        </table></div>`)}

      ${stepCard(6, 'DO', 'Implementation + ODG Gate', `
        <div style="overflow-x:auto"><table class="kpi-table" style="font-size:0.83rem">
          <thead><tr><th>No.</th><th>Plan</th><th>Start</th><th>Due</th><th>Responsible</th><th>Status</th></tr></thead>
          <tbody>${arRows}</tbody>
        </table></div>
        <div class="ro-gate">ODG gate: ${gateBadge} <span class="text-muted" style="font-size:0.78rem">${esc(gate.note || '')}</span></div>`)}

      ${stepCard(7, 'CHECK', 'Results', `
        ${kv('KPI', c.step7?.kpi)}
        ${kv('Start (baseline)', c.step7?.measurementStart)}
        ${kv('End (result)', c.step7?.measurementEnd)}
        ${kv('New Target', c.step7?.newTarget)}
        ${c.step7?.narrative ? `<div class="ro-narr">${esc(c.step7.narrative)}</div>` : ''}`)}

      ${stepCard(8, 'ACT', 'Standardize + Yokoten', `
        ${kv('Process Documents', c.step8?.processDocuments)}
        ${kv('Training', c.step8?.training)}
        ${kv('Yokoten', c.step8?.yokoten)}
        <div class="sop-writeback" style="margin-top:12px">
          <div class="sop-writeback__label">SOP Write-Back</div>
          <div style="font-weight:600;font-size:0.9rem">${esc(sopLink.title || '—')}</div>
          <div class="text-muted" style="font-size:0.8rem;margin-top:2px">
            ${sopLink.writtenBack ? '✓ Standard work updated & written back to the SOP library (Yokoten complete).' : 'Standard-work write-back pending close.'}
          </div>
          <a href="#/dept/${esc(dept.id)}/sop" style="display:inline-block;margin-top:8px;font-size:0.85rem;color:var(--accent)">Open Standard Work view →</a>
        </div>`)}
    </div>`;
}

// ─── Main render ──────────────────────────────────────────────────────────────

async function doRender() {
  if (!_dept || !_mount) return;

  if (!_kzRecords.length) {
    try {
      const res = await fetch('data/kz-records.json');
      const all = await res.json();
      _kzRecords = byDept(all, _dept.id);
    } catch (e) { console.warn('Could not load kz-records.json', e); }
  }
  if (!_template) {
    try {
      const res = await fetch('data/eightstep-template.json');
      _template = await res.json();
    } catch (e) { console.warn('Could not load eightstep-template.json', e); }
  }

  let content;

  if (_readKZ) {
    // ── Read-view of a completed A3 ─────────────────────────────────────────
    content = renderReadA3(_readKZ, _dept, _template || { steps: [], scoringMatrix: {} });
  } else if (!_activeKZ) {
    // ── Tracker view ─────────────────────────────────────────────────────────
    const openItems   = _kzRecords.filter(k => !k.closed).length;
    const closedItems = _kzRecords.filter(k => k.closed).length;
    const a3Count     = _kzRecords.filter(isCompletedA3).length;

    content = `
      <div>
        <div class="ps-tophead">
          <div>
            <h2 style="margin:0 0 4px">Problem-Solving Tracker</h2>
            <p class="text-muted" style="margin:0;font-size:0.85rem">
              ${_kzRecords.length} total · ${openItems} open · ${closedItems} closed · ${a3Count} full A3${a3Count === 1 ? '' : 's'} — ${esc(_dept.name)}
            </p>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
            <span style="font-size:0.78rem;color:var(--slate-500)">Trigger a new 8-step from a red sub-KPI:</span>
            ${renderRedKpiSelector(_dept)}
          </div>
        </div>

        ${renderTrackerTable(_kzRecords, _dept)}

        <div class="ps-about">
          <div class="ps-about__label">How the 8-step is triggered</div>
          <p class="text-muted" style="margin:0;font-size:0.8rem">
            A main KPI turning red is drilled to its contributing sub-KPIs; a red <b>sub-KPI</b> opens an 8-step owned by the
            manager at that level. The agent pre-solves the planning steps (1–6) into a reviewable draft — grounded in the red
            KPI, the governing SOP, and a prior similar KZ — and the human reviews &amp; finishes. Rows tagged <span class="a3-tag">A3</span>
            carry full completed content from the FMDS-New discovery.
          </p>
        </div>
      </div>`;
  } else {
    // ── Wizard view ───────────────────────────────────────────────────────────
    const kpiId = _activeKZ._kpiId;
    const kpi   = kpiId && _dept.kpis ? _dept.kpis.find(k => k.id === kpiId) : null;
    const tmpl  = _template || { steps: [] };

    content = `
      <div>
        <div style="margin-bottom:16px">
          <button class="btn btn--outline" onclick="window._psCloseWizard()" style="font-size:0.8rem">← Back to tracker</button>
        </div>
        ${renderWizardStep(_dept, kpi, _currentStep, tmpl)}
      </div>`;
  }

  _mount.innerHTML = `<div class="ps-view">${content}</div>`;
  attachHandlers();
}

// ─── Event handlers ───────────────────────────────────────────────────────────

function attachHandlers() {
  window._psOpenWizard = () => {
    const sel = document.getElementById('ps-kpi-select');
    const kpiId = sel && sel.value;
    if (!kpiId) { alert('Please select a red sub-KPI first.'); return; }
    const kpi = _dept.kpis ? _dept.kpis.find(k => k.id === kpiId) : null;
    _activeKZ = newKZ({ item: kpi?.name || 'Problem', who: _dept.lead || '', deptId: _dept.id });
    _activeKZ._kpiId = kpiId;
    _activeKZ._prior = priorSimilarKZ(_dept);
    _activeKZ._sop   = govSop(_dept);
    _currentStep = 1;
    _stepData = {};
    _sopWrittenBack = false;
    doRender();
  };

  window._psOpenRead = (idx) => {
    _readKZ = _kzRecords[idx] || null;
    doRender();
  };
  window._psCloseRead = () => { _readKZ = null; doRender(); };

  window._psCloseWizard = () => {
    _activeKZ = null; _currentStep = 1; _stepData = {}; _sopWrittenBack = false;
    doRender();
  };

  window._psGotoStep = (n) => { _saveCurrentStepInputs(); _currentStep = n; doRender(); };

  window._psConfirmStep = (n) => {
    _saveCurrentStepInputs();
    if (_activeKZ) _activeKZ.steps[String(n)] = true;
    if (n === 8) {
      if (_activeKZ) { _activeKZ.closed = true; _activeKZ.active = false; }
      _kzRecords = [_activeKZ, ..._kzRecords];

          </td>
          <td class="sw-lib-area">
            ${doc.area ? `<span class="sw-lib-area-text">${escHtml(doc.area)}</span>` : ''}
            ${doc.product ? `<span class="sw-lib-product">${escHtml(doc.product)}</span>` : ''}

          <td class="sw-lib-owner">${doc.owner ? escHtml(doc.owner) : '<span class="text-muted">—</span>'}</td>

    }).join('');

    return `
      <div class="sw-lib-group">

          <span class="sw-lib-group-label" style="color:${c.color || '#334155'}">${t}</span>

        <div style="overflow-x:auto">

                <th style="width:140px">Link</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  const noResultsHtml = filtered.length === 0
    ? `<div class="sw-lib-empty">No documents match the current filter.</div>`
    : '';

  return `
    <div class="sw-lib-section">
      <div class="sw-lib-header">
        <div class="sw-lib-header-left">
          <div class="sw-count-chips">${buildCountChips(deptLib.counts)}</div>
          <div class="sw-drive-badges">${drives.map(driveBadge).join('')}</div>
        </div>
        <div class="sw-lib-search-wrap">
          <input class="sw-lib-search" type="text" placeholder="Search documents…"
                 value="${escHtml(_filter)}"
                 oninput="window._swSetFilter(this.value)" />
        </div>
      </div>

      <div class="sw-type-tabs">${typeTabsHtml}${clearTabHtml}</div>

      <div class="sw-lib-count text-muted" style="font-size:0.78rem;margin-bottom:12px">
        Showing ${filtered.length} of ${totalDocs} documents
        ${_filter ? ` matching <strong>${escHtml(_filter)}</strong>` : ''}
        ${_typeFilter ? ` filtered to <strong>${escHtml(_typeFilter)}</strong>` : ''}
      </div>

      ${groupsHtml}
      ${noResultsHtml}

      <div class="sw-lib-note-footer">
        <span>
          <span class="sw-rep-badge">representative</span>
          = inferred from aggregate counts only — exact title not enumerated in the discovery
        </span>
        <span style="margin-left:16px">
          <span class="sw-link-pending">link pending</span>
          = doc confirmed in SharePoint; deep-link not yet mapped
        </span>
