}

// ─── B. EMBEDDED SOPs (in-app full content) ───────────────────────────────────

function renderSopList(sopObjects) {
  if (!sopObjects.length) return '';

  const cards = sopObjects.map(sop => {
    const backlinks = SOP_KZ_BACKLINKS[sop.id] || [];
    const blHtml = backlinks.length
      ? backlinks.map(bl => `
          <span class="kz-backlink" title="Step ${bl.step} of ${escHtml(bl.kzNumber)} updated this SOP">
            Updated by <strong>${escHtml(bl.kzNumber)}</strong> — ${escHtml(bl.title)}
          </span>`).join('')
      : '';

    const isLsw = sop.id === '_lsw' || (sop.cadenceRows);

    return `
      <div class="sop-card" onclick="window._swOpenSop(${escHtml(JSON.stringify(sop.id))})">
        <div class="sop-card__top">
          <div>
            <span class="sw-type-badge" style="background:#e8f0ff;color:#1864ab;border:1px solid #74c0fc">${escHtml(isLsw ? 'LSW' : sop.docType || 'BWI')}</span>
            <span class="sw-inapp-badge" style="margin-left:6px">Full content in-app</span>
            <h3 class="sop-card__title">${escHtml(sop.title)}</h3>
          </div>
          <span class="sop-card__arrow">→</span>
        </div>
        <p class="sop-card__purpose text-muted">${escHtml(isLsw ? (sop.note || 'Leader Standard Work cadence') : sop.purpose)}</p>
        <div class="sop-card__meta">
          ${!isLsw && sop.steps ? `<span class="text-muted" style="font-size:0.75rem">${sop.steps.length} steps</span>` : ''}
          ${isLsw && sop.cadenceRows ? `<span class="text-muted" style="font-size:0.75rem">${sop.cadenceRows.length} cadence activities</span>` : ''}
          ${sop.revisions && sop.revisions.length
            ? `<span class="text-muted" style="font-size:0.75rem">Rev ${escHtml(sop.revisions[sop.revisions.length-1].revision)} · ${escHtml(sop.revisions[sop.revisions.length-1].date)}</span>`
            : ''}
        </div>
        ${blHtml ? `<div class="sop-card__backlinks">${blHtml}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="sw-section-label" style="margin-top:28px">SOPs Available In-App</div>
    <p class="text-muted" style="font-size:0.8rem;margin-bottom:12px">
      These documents have full step-by-step content embedded. Click to open.
    </p>

}

function renderSopDetail(sop) {

  const backlinks = SOP_KZ_BACKLINKS[sop.id] || [];

  const stepsHtml = (sop.steps || []).map(step => `
    <tr>
      <td class="sw-step-n">${step.n}</td>
      <td class="sw-step-main">${escHtml(step.mainStep)}</td>
      <td class="sw-step-kp">${escHtml(step.keyPoints)}</td>
      <td class="sw-step-reason">${escHtml(step.reason)}</td>

  const revisionsHtml = sop.revisions && sop.revisions.length
    ? sop.revisions.map(r => `
        <tr>
          <td class="text-mono" style="font-size:0.8rem;white-space:nowrap">${escHtml(r.date)}</td>
          <td style="font-size:0.8rem">${escHtml(r.revision)}</td>
          <td style="font-size:0.8rem">${escHtml(r.description)}</td>
          <td style="font-size:0.8rem;color:var(--slate-500)">${escHtml(r.requester || '')}</td>

  const backlinksHtml = backlinks.length
    ? `
      <div class="sop-detail__backlinks">
        <div class="sw-section-label">8-Step Backlinks</div>
        ${backlinks.map(bl => `
          <div class="kz-backlink-detail">
            <strong>${escHtml(bl.kzNumber)}</strong>
            <span>${escHtml(bl.title)}</span>
            <span class="text-muted" style="font-size:0.75rem">Step ${bl.step} — Standardize</span>
          </div>`).join('')}

    ? `<div style="margin-top:8px;font-size:0.8rem;color:var(--slate-600)">
        <span style="font-weight:600">Linked forms: </span>

      <button class="btn btn--outline" style="margin-bottom:20px;font-size:0.8rem"
              onclick="window._swCloseSop()">← Back to library</button>

          ${sop.deptId ? `Dept: <strong>${escHtml(sop.deptId)}</strong>` : ''}

        <p style="font-size:0.875rem;color:var(--slate-700)">${escHtml(sop.purpose)}</p>
        ${sop.note ? `<p class="text-muted" style="font-size:0.8rem;margin-top:6px">${escHtml(sop.note)}</p>` : ''}
      </div>

      <div class="sop-detail__steps">
        <div class="sw-section-label">Standard Work Steps</div>
        <div style="overflow-x:auto">
          <table class="sw-table">
            <thead>
              <tr>
                <th style="width:36px">#</th>
                <th style="min-width:160px">Main Step</th>

// ─── C. LSW detail view (for ODG embedded _lsw.json) ──────────────────────────

function renderLswDetail(lsw) {
  const groups = ['Daily', 'Weekly', 'Monthly', 'Other'];
  const byGroup = {};
  groups.forEach(g => { byGroup[g] = []; });
  (lsw.cadenceRows || []).forEach(row => {
    const g = freqGroup(row.frequency);
    (byGroup[g] = byGroup[g] || []).push(row);
  });

  const groupHtml = groups.map(g => {
    const rows = byGroup[g];
    if (!rows || !rows.length) return '';
    const color = freqColor(rows[0].frequency);

    const rowsHtml = rows.map(row => `
      <tr>
        <td>
          <span class="lsw-activity">${escHtml(row.activity)}</span>
          ${row.specificDay ? `<span class="text-muted" style="display:block;font-size:0.72rem;margin-top:2px">${escHtml(row.specificDay)}</span>` : ''}
        </td>
        <td>
          <span class="lsw-freq-chip" style="background:${color}1a;color:${color};border-color:${color}33">
            ${escHtml(row.frequency)}
          </span>
        </td>
        <td style="font-size:0.8rem">${escHtml(row.workType || '')}</td>
        <td><span class="lsw-focus-chip">${escHtml(row.focus || '')}</span></td>
        <td style="font-size:0.78rem;color:var(--slate-600)">${escHtml(row.description || '')}</td>
      </tr>`).join('');

    return `
      <div class="lsw-group">
        <div class="lsw-group-label" style="color:${color}">${g}</div>
        <div style="overflow-x:auto">
          <table class="sw-table">
            <thead>
              <tr>
                <th style="min-width:200px">Activity</th>
                <th style="width:100px">Frequency</th>
                <th style="width:110px">Work Type</th>
                <th style="width:110px">Focus</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  const timeModel = lsw.timeAllocationModel;
  const timeHtml = timeModel && timeModel.buckets
    ? `
      <div class="lsw-time-model">
        <div class="sw-section-label">Time Allocation Model</div>
        <p class="text-muted" style="font-size:0.8rem;margin-bottom:10px">${escHtml(timeModel.note)}</p>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          ${timeModel.buckets.map(b => `
            <div class="lsw-time-bucket">
              <div class="lsw-time-pct">${Math.round(b.pct * 100)}%</div>
              <div class="lsw-time-label">${escHtml(b.label)}</div>
              ${b.illustrative ? `<span class="badge badge--illustrative">illustrative</span>` : ''}
            </div>`).join('')}
        </div>
      </div>`
    : '';

  return `
    <div class="sop-detail">
      <button class="btn btn--outline" style="margin-bottom:20px;font-size:0.8rem"
              onclick="window._swCloseSop()">← Back to library</button>

      <div class="sop-detail__header">
        <span class="sw-type-badge" style="background:#fce7f3;color:#a2136c;border:1px solid #f9a8d4">LSW</span>
        <h2 style="margin-top:8px">${escHtml(lsw.title)}</h2>
        <div class="sop-detail__meta text-muted" style="font-size:0.8rem;margin-top:4px">
          Source: ${escHtml(lsw.source || '_lsw.json')} · Roles: ${escHtml((lsw.roles || []).join(', '))}
        </div>
      </div>

      <div class="lsw-section" style="margin-top:20px">
        ${groupHtml}
        ${timeHtml}
      </div>
    </div>`;
}

// ─── D. Main render ───────────────────────────────────────────────────────────

async function loadLibData() {
  if (_libData) return _libData;
  try {
    const res = await fetch('data/sop-library.json');
    _libData = await res.json();
  } catch (e) {
    console.warn('Could not load sop-library.json:', e);
    _libData = null;
  }
  return _libData;
}

async function doRender() {
  if (!_dept || !_mount) return;

  // Load full-content SOPs
  const sopPaths = DEPT_SOPS[_dept.id] || [];
  const sopObjects = [];
  for (const path of sopPaths) {
    if (!_sopCache[path]) {
      try {
        const res = await fetch(path);
        _sopCache[path] = await res.json();
      } catch (e) {
        console.warn('Could not load SOP:', path, e);
      }
    }
    if (_sopCache[path]) sopObjects.push(_sopCache[path]);
  }

  // Load library data
  const libData = await loadLibData();
  const deptLib = libData && libData.departments && libData.departments[_dept.id];

  // ── Detail view ──
  if (_activeSop) {
    const sop = sopObjects.find(s => s.id === _activeSop);
    _mount.innerHTML = `
      <div class="sw-view">
        ${sop
          ? renderSopDetail(sop)
          : `<p class="text-muted">SOP "${escHtml(_activeSop)}" not found.</p>`}
      </div>`;
    attachSwHandlers(sopObjects);
    return;
  }

  // ── Library + embedded SOPs view ──
  const headerHtml = `
    <div class="sw-view-header">
      <div>
        <h2 class="sw-view-title">Standard Work · <span style="color:var(--accent)">${escHtml(_dept.name)}</span></h2>
        <p class="text-muted" style="font-size:0.83rem;margin-top:2px">
          Per-department document library — SharePoint-linked. Embedded SOPs open in-app.
        </p>
      </div>
    </div>`;

  const libraryHtml = deptLib
    ? renderLibrarySection(deptLib)
    : `<div class="sw-lib-empty">No library data for ${escHtml(_dept.name)} yet.</div>`;

  const embeddedHtml = renderSopList(sopObjects);

  _mount.innerHTML = `
    <div class="sw-view">
      ${headerHtml}
      <div class="sw-section-label">Document Library</div>
      ${libraryHtml}
      ${embeddedHtml}
    </div>`;

  attachSwHandlers(sopObjects);
}

// ─── Event handlers ───────────────────────────────────────────────────────────

function attachSwHandlers(sopObjects) {
  window._swOpenSop = (sopId) => {
    _activeSop = sopId;
    doRender();
  };
  window._swCloseSop = () => {
    _activeSop = null;
    doRender();
  };
  window._swSetFilter = (val) => {
    _filter = val;
    doRender();
  };
  window._swSetTypeFilter = (val) => {
    _typeFilter = val === _typeFilter ? '' : val;  // toggle
    doRender();
  };
}

  const targetY = target != null ? py(target) : null;
  const tLine = targetY != null
    ? `<line x1="${pad}" y1="${targetY}" x2="${W - pad}" y2="${targetY}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>`
    : '';
  // Color the line by final value vs target
  let lineColor = '#64748b';
  if (target != null && vals.length) {
    const last = vals[vals.length - 1];
    // Simple: flag April OTP for Mexico (0.789 vs 0.985)
    lineColor = '#3b82f6'; // blue default
  }
  return `<svg width="${W}" height="${H}" style="display:block">
    ${tLine}
    <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="1.5"/>
    ${vals.map((v, i) => `<circle cx="${px(i)}" cy="${py(v)}" r="2" fill="${lineColor}"/>`).join('')}
  </svg>`;
}

// ─── Manual / formula entry badge ────────────────────────────────────────────

/**
 * Badge indicating how a value is entered in the source FMDS Excel board.
 *   manual  → hand-keyed literal (red-tinted)
 *   formula → computed by in-sheet formula (blue-tinted)
 */
function entryBadge(entryType, formula) {
  if (!entryType) return '';
  if (entryType === 'formula') {
    const title = formula ? `Formula: ${formula}` : 'Computed by in-sheet formula';
    return `<span class="contrib-badge contrib-badge--formula" title="${title}">formula</span>`;
  }
  // manual
  return `<span class="contrib-badge contrib-badge--manual" title="Hand-keyed literal (manual re-key)">manual</span>`;
}

/** Render rollup note for OTP or PPLH (from kpi.rollup object) */
function rollupNote(kpi) {
  if (!kpi.rollup) return '';
  const r = kpi.rollup;
  const color = r.isManualRekey === false
    ? '#1e40af'  // formula roll-up — blue
    : '#92400e'; // manual re-key — amber
  const icon = r.isManualRekey === false ? '⊕' : '↵';
  return `<div style="font-size:0.68rem;color:${color};padding-left:26px;margin-top:4px;line-height:1.5">
    ${icon} <strong>${r.isManualRekey === false ? 'Formula roll-up' : 'Manual re-key'}:</strong>
    ${r.note || (r.formula ? `${r.method} — ${r.formula}` : r.method || '')}
  </div>`;
}

/** Render operator/line contribution rows for OTP or PPLH */
function renderContribRows(kpi) {
  if (!Array.isArray(kpi.contributions) || !kpi.contributions.length) return '';

  return kpi.contributions.map(c => {
    const hasVal  = c.value != null;
    const valStr  = hasVal ? formatLocVal(c.value, c.unit || kpi.unit, kpi.targetType) : '—';
    const tgtStr  = c.target != null ? formatLocVal(c.target, c.unit || kpi.unit, kpi.targetType) : '—';

    // RAG for this line (only when actual value exists)
    const lineRag = hasVal && c.target != null
      ? ragStatus(c.value, c.target, kpi.direction || 'higher_better')
      : 'nodata';

    const nodataMark = (c.nodata || !hasVal)
      ? '<span class="badge badge--warning" style="font-size:0.6rem">no data</span>'
      : '';

    const ownerHtml = c.owner
      ? `<span style="font-size:0.63rem;color:var(--slate-400);margin-left:6px">${c.owner}</span>`
      : '';

    const formulaHtml = c.formula
      ? `<div style="font-size:0.62rem;color:#1e40af;padding-left:62px;margin-top:2px;font-family:var(--font-mono,'IBM Plex Mono',monospace)">${c.formula}</div>`
      : '';

    // Monthly sparkline if monthlyActuals present on contribution
    const cSpark = c.monthlyActuals
      ? monthSparkline(c.monthlyActuals, c.target)
      : '';

    return `
      <tr class="contrib-operator-row">
        <td style="padding-left:56px">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span style="color:var(--slate-300);font-size:0.7rem">├─</span>
            <span style="font-size:0.8rem">${c.label}</span>
            ${entryBadge(c.entryType, c.formula)}
            ${nodataMark}
            ${ownerHtml}
          </div>
          ${formulaHtml}
        </td>
        <td class="text-right text-mono" style="font-size:0.8rem">${tgtStr}</td>
        <td class="text-right text-mono" style="font-size:0.8rem">${valStr}</td>
        <td>${ragChip(lineRag)}</td>
        <td></td>
        <td>${cSpark}</td>
      </tr>`;
  }).join('');
}

/**
 * Source badge for a per-location FMDS board KPI.
 * Shows targetSource (WPS/Business Central/etc.) if present.
 * Safety (manualOnly) items get a distinct red badge.
 * Falls back to "FMDS Board" when no targetSource set.
 */
function locSourceBadge(kpi) {
  if (kpi.manualOnly === true) {
    return `<span class="badge" title="Manual entry — no source system" style="font-size:0.65rem;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5">Manual entry</span>`;
  }
  const ts = kpi.targetSource || kpi.source;
  if (!ts) {
    return `<span class="badge" style="font-size:0.65rem">FMDS Board</span>`;
  }
  const label = ts.split(' / ')[0];
  const wasReKeyed = kpi.source && kpi.source !== ts &&
    ['manual', 'hand-keyed', 'coo board', 'literal', 'bowler'].some(tok => (kpi.source || '').toLowerCase().includes(tok));
  if (wasReKeyed) {
    return `<span class="badge" title="Target: ${ts} (today: re-keyed)" style="font-size:0.65rem;background:#f0fdf4;color:#166534;border:1px solid #86efac">${label}</span>`;
  }
  return `<span class="badge" title="${ts}" style="font-size:0.65rem">${label}</span>`;
}

/** Render a single per-location KPI row */
function renderLocKpiRow(kpi, expandedLocKpis) {
  const rag       = locRag(kpi);
  const isExpanded = expandedLocKpis.has(kpi.id);

  // Contributions (operator/line level) take priority over subLines for OTP/PPLH
  const hasContribs  = Array.isArray(kpi.contributions) && kpi.contributions.length > 0;
  const hasSubLines  = !hasContribs && Array.isArray(kpi.subLines) && kpi.subLines.length > 0;
  const hasByBldg    = !hasContribs && !hasSubLines && Array.isArray(kpi.byBuilding) && kpi.byBuilding.length > 0;
  const hasSups      = !hasContribs && !hasSubLines && !hasByBldg && Array.isArray(kpi.supervisors) && kpi.supervisors.length > 0;
  const hasSubRows   = hasContribs || hasSubLines || hasByBldg || hasSups;
  // Every KPI is click-in — those with no sub-rows still expand for the explanation.
  const hasExpandable = true;

  const spark = kpi.monthlyActuals
    ? monthSparkline(kpi.monthlyActuals, kpi.target)
    : '';

  // Flag icons
  const flagHtml = kpi.flag
    ? `<span class="flag-icon" title="${String(kpi.flag).replace(/"/g, '&quot;')}">⚠</span>`
    : '';
  const mxOnlyBadge = kpi.mexicoOnly
    ? `<span style="font-size:0.6rem;padding:1px 5px;border-radius:3px;background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd">Mexico only</span>`
    : '';
  const nodataBadge = kpi.nodata
    ? `<span class="badge badge--warning">no data</span>`
    : '';

  const toggleBtn = hasExpandable
    ? `<button class="btn btn--ghost loc-expand-btn" data-loc-kpi="${kpi.id}"
               style="padding:2px 6px;font-size:0.7rem;border-radius:3px">${isExpanded ? '▼' : '▶'}</button>`
    : '<span style="display:inline-block;width:22px"></span>';

  // Contribution count badge (for OTP/PPLH with contributions)
  const contribCountBadge = hasContribs && !isExpanded
    ? `<span style="font-size:0.63rem;padding:1px 6px;border-radius:3px;background:var(--slate-100);
           color:var(--slate-600);margin-left:4px">${kpi.contributions.length} lines</span>`
    : '';

  let rows = `
    <tr class="main-row ${hasExpandable ? 'main-row--expandable' : ''}" data-loc-kpi-id="${kpi.id}">
      <td>
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          ${toggleBtn}
          ${categoryBadge(kpi.category)}
          <span style="font-weight:500">${kpi.name}</span>
          ${unitBadge(kpi)}
          ${flagHtml}
          ${mxOnlyBadge}
          ${nodataBadge}
          ${contribCountBadge}
        </div>
        ${kpi.unitNote ? `<div style="font-size:0.68rem;color:#92400e;padding-left:26px;margin-top:2px">⚠ ${kpi.unitNote}</div>` : ''}
        ${kpi.nodataNote ? `<div style="font-size:0.68rem;color:var(--slate-500);padding-left:26px;margin-top:2px">${kpi.nodataNote}</div>` : ''}
        ${kpi.flagDetail ? `<div style="font-size:0.68rem;color:#b91c1c;padding-left:26px;margin-top:2px">⚠ ${kpi.flagDetail}</div>` : ''}
        ${hasContribs ? rollupNote(kpi) : ''}
      </td>
      <td class="text-right text-mono">${kpi.target == null ? '—' : formatLocVal(kpi.target, kpi.unit, kpi.targetType)}</td>
      <td class="text-right text-mono">${kpi.nodata || kpi.actual == null ? '—' : formatLocVal(kpi.actual, kpi.unit, kpi.targetType)}</td>
      <td>${ragChip(rag)}</td>
      <td>${locSourceBadge(kpi)}</td>
      <td>${spark}</td>
    </tr>`;

  // Expanded: lead with the explanation block, then operator contributions
  // (OTP/PPLH) or sub-lines/buildings/supervisors where they exist.
  if (isExpanded) {
    rows += renderExplainBlock(kpi, { id: 'operations' }, { rag });
    if (kpi.rollup && !hasContribs) rows += `<tr class="kpi-explain-tail"><td colspan="6" style="padding:0">${rollupNote(kpi)}</td></tr>`;
  }
  if (isExpanded && hasSubRows) {
    if (hasContribs) {
      rows += renderContribRows(kpi);
    } else {
      const items = hasSubLines ? kpi.subLines
        : hasByBldg ? kpi.byBuilding.map(b => ({
            line: `Building ${b.building}`,
            target: b.target, actual: b.actual
          }))
        : kpi.supervisors.map(s => ({
            line: `${s.name} (${s.role})`,
            target: s.target, actual: s.actual,
            note: s.note
          }));

      rows += items.map(sub => {
        const subActual = sub.actual != null ? sub.actual
          : (sub.monthlyActuals ? Object.values(sub.monthlyActuals).filter(v => v != null).pop() : null);
        const subRag = (subActual == null || sub.target == null)
          ? 'nodata'
          : ragStatus(subActual, sub.target, kpi.direction || 'higher_better');
        const subMonthsSpark = sub.monthlyActuals
          ? monthSparkline(sub.monthlyActuals, sub.target)
          : '';
        return `
          <tr class="contributor-row">
            <td style="padding-left:48px">
              <span class="text-muted" style="font-size:0.75rem">↳</span>
              ${sub.line || sub.name || ''}
              ${sub.note ? `<span style="font-size:0.65rem;color:var(--slate-500);margin-left:4px">${sub.note}</span>` : ''}
              ${subActual == null ? '<span class="badge badge--warning">no data</span>' : ''}
            </td>
            <td class="text-right text-mono">${sub.target == null ? '—' : formatLocVal(sub.target, kpi.unit, kpi.targetType)}</td>
            <td class="text-right text-mono">${subActual == null ? '—' : formatLocVal(subActual, kpi.unit, kpi.targetType)}</td>
            <td>${ragChip(subRag)}</td>
            <td></td>
            <td>${subMonthsSpark}</td>
          </tr>`;
      }).join('');
    }
  }

  return rows;
}

/** Build the per-location FMDS board table body */
function buildLocBoardTable(locBoard, filterText, expandedLocKpis) {
  if (!locBoard || !locBoard.kpis || !locBoard.kpis.length) {
    return `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--slate-500)">
      No per-location board data available.</td></tr>`;
  }
  let kpis = locBoard.kpis;
  if (filterText) {
    kpis = kpis.filter(k =>
      k.name.toLowerCase().includes(filterText.toLowerCase()) ||
      k.category.toLowerCase().includes(filterText.toLowerCase())
    );
  }
  if (!kpis.length) {
    return `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--slate-500)">
      No KPIs match "${filterText}"</td></tr>`;
  }
  return kpis.map(k => renderLocKpiRow(k, expandedLocKpis)).join('');
}

/** Header strip shown above the per-location table */
function buildLocBoardHeader(locBoard) {
  if (!locBoard) return '';
  const lines = locBoard.productionLines || [];
  return `
    <div style="background:var(--slate-50);border:1px solid var(--slate-200);border-radius:var(--radius);
         padding:10px 16px;margin-bottom:12px;font-size:0.78rem;line-height:1.6">
      <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:baseline">
        <span><strong>${locBoard.label}</strong> FMDS Board</span>
        <span class="text-muted">${locBoard.kpiCount} KPI column-pairs in source</span>
        <span class="text-muted">${locBoard.productionLines ? locBoard.productionLines.length : 0} production lines</span>
        ${locBoard.weeklyLabel === 'DAYS' ? '<span class="badge">Cadence: DAYS</span>' : ''}
      </div>
      ${lines.length
        ? `<div style="margin-top:6px;color:var(--slate-500);font-size:0.7rem">
             Lines: ${lines.join(' · ')}
           </div>` : ''}
      ${locBoard.actualsNote
        ? `<div style="margin-top:4px;color:var(--slate-600);font-size:0.7rem;font-style:italic">
             ${locBoard.actualsNote}
           </div>` : ''}
    </div>`;
}

// ─── Full table ───────────────────────────────────────────────────────────────

function buildTable(dept, locationId, filterText, expandedIds) {
  const mainKpis = mains(dept).filter(k =>
    !filterText || k.name.toLowerCase().includes(filterText.toLowerCase())
  );

  if (!mainKpis.length) {
    return `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--slate-500)">
      No KPIs match "${filterText}"</td></tr>`;
  }

  return mainKpis
    .map(kpi => renderMainRow(dept, kpi, locationId, expandedIds))
    .join('');
}

// ─── Location switcher HTML ───────────────────────────────────────────────────

function buildSwitcher(activeLocation) {
  const activeChips = ACTIVE_LOCATIONS.map(loc => {
    const isActive = activeLocation === loc.id;
    return `<button class="loc-chip ${isActive ? 'loc-chip--active' : ''}" data-loc="${loc.id}">
      ${loc.label}
    </button>`;
  }).join('');

  const noDataChips = NO_DATA_LOCATIONS.map(loc =>
    `<button class="loc-chip loc-chip--disabled" disabled title="No data available for this location">
      ${loc.label} <span style="font-size:0.65rem;opacity:0.7">no data</span>
    </button>`
  ).join('');

  const weChip = `<button class="loc-chip ${activeLocation === 'we' ? 'loc-chip--active' : ''} loc-chip--we" data-loc="we">
    WE Main
  </button>`;

  return `
    <div class="loc-switcher" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;
         margin-bottom:16px;padding:12px 16px;background:var(--slate-50);
         border:1px solid var(--slate-200);border-radius:var(--radius)">
      <span style="font-size:0.7rem;font-weight:700;letter-spacing:0.06em;
                   text-transform:uppercase;color:var(--slate-500);margin-right:4px">Location</span>
      ${weChip}
      <span style="color:var(--slate-300);font-size:0.8rem">|</span>
      ${activeChips}
      <span style="color:var(--slate-300);font-size:0.8rem">|</span>
      ${noDataChips}
    </div>`;
}

// ─── Public entry point ───────────────────────────────────────────────────────

function renderLocationBoard(dept, mount) {
  injectStyles();

  let locationId     = 'we';   // default: WE main (COO board)
  let filterText     = '';
  let expandedIds    = new Set(); // for WE-main COO-board rows
  let expandedLocIds = new Set(); // for per-location FMDS board rows

  /** True when a specific location is selected and has a locationBoard */
  function hasLocBoard(locId) {
    return locId !== 'we' && dept.locationBoards && dept.locationBoards[locId];
  }

  function renderTable() {
    const tbody = document.getElementById('lb-tbody');
    const locHeader = document.getElementById('lb-loc-header');
    if (!tbody) return;

    if (hasLocBoard(locationId)) {
      const locBoard = dept.locationBoards[locationId];
      if (locHeader) locHeader.innerHTML = buildLocBoardHeader(locBoard);
      tbody.innerHTML = buildLocBoardTable(locBoard, filterText, expandedLocIds);
      bindLocEvents();
    } else {
      if (locHeader) locHeader.innerHTML = '';
      tbody.innerHTML = buildTable(dept, locationId, filterText, expandedIds);
      bindEvents();
    }
  }

  function renderSwitcher() {
    const sw = document.getElementById('lb-switcher');
    if (sw) {
      sw.innerHTML = buildSwitcher(locationId);
      bindSwitcherEvents();
    }
  }

  function bindSwitcherEvents() {
    mount.querySelectorAll('.loc-chip[data-loc]').forEach(btn => {
      btn.addEventListener('click', () => {
        locationId = btn.dataset.loc;
        expandedIds.clear();
        expandedLocIds.clear();
        renderSwitcher();
        renderTable();
      });
    });
  }

  /** Bind expand/collapse for per-location FMDS KPI rows */
  function bindLocEvents() {
    mount.querySelectorAll('.loc-expand-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.locKpi;
        if (expandedLocIds.has(id)) expandedLocIds.delete(id);
        else expandedLocIds.add(id);
        renderTable();
      });
    });

    mount.querySelectorAll('[data-loc-kpi-id]').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.dataset.locKpiId;
        if (expandedLocIds.has(id)) expandedLocIds.delete(id);
        else expandedLocIds.add(id);
        renderTable();
      });
    });
  }

  function bindEvents() {
    // Story panel toggle
    const storyBtn = mount.querySelector('#otp-story-toggle');
    const storyPanel = mount.querySelector('#otp-story-panel');
    if (storyBtn && storyPanel) {
      storyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const hidden = storyPanel.style.display === 'none' || !storyPanel.style.display;
        storyPanel.style.display = hidden ? 'block' : 'none';
        storyBtn.textContent = hidden ? 'ⓘ hide' : 'ⓘ story';
      });
    }

    // Expand/collapse buttons
    mount.querySelectorAll('.expand-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.kpiId;
        if (expandedIds.has(id)) expandedIds.delete(id);
        else expandedIds.add(id);
        renderTable();
      });
    });

    // Row click expand
    mount.querySelectorAll('.main-row--expandable').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.dataset.kpiId;
        if (expandedIds.has(id)) expandedIds.delete(id);
        else expandedIds.add(id);
        renderTable();
      });
    });
  }

  // ─── Initial paint ────────────────────────────────────────────────────────
  mount.innerHTML = `
    <div class="team-board">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px">
        <div>
          <h2>${dept.name} — KPI Boards</h2>
          <p class="text-muted text-small mt-1">L2 · ${dept.lead || ''} · Location model (Mechanism B) · Click OTP or PPLH to expand operator/line contributions</p>
        </div>
        <a href="#/dept/${dept.id}/team" class="btn btn--ghost" style="font-size:0.8rem">
          ← Overview
        </a>
      </div>

      <div id="lb-switcher">
        ${buildSwitcher(locationId)}
      </div>

      <div id="lb-loc-header"></div>

      <div class="filter-row" style="margin-bottom:16px">
        <input id="lb-filter" type="search" placeholder="Filter KPIs…" style="width:240px">
      </div>

      <div class="table-wrap">
        <table id="lb-table">
          <thead>
            <tr>
              <th style="min-width:260px">KPI</th>

    location.hash = `#/dept/${session.deptId}/${homeViewFor(session)}`;
  }
}

// ─── Login gate ──────────────────────────────────────────────────────────────
function showLogin() {
  const departments = store.get().departments;
  if (!departments.length) {
    app.innerHTML = `<div class="container" style="padding-top:48px"><p class="text-muted">Loading…</p></div>`;
    return;
  }
  renderLogin(app, ({ deptId, role, persona }) => {
    store.set({ session: { deptId, role, persona } });
    const target = `#/dept/${deptId}/${role === 'L1' ? 'my' : 'team'}`;
    // If the hash won't change (already on target), route() won't fire via hashchange.
    if (location.hash === target) route();
    else location.hash = target;
  }, departments);
}

function signOut() {
  store.set({ session: null, dept: null });
  if (location.hash === '#/login') showLogin();
  else location.hash = '#/login';   // hashchange → route() → showLogin()
}

// ─── Load dept JSON + route to view ────────────────────────────────────────
async function loadDeptView(deptId, view) {
  let dept = store.get().deptCache?.[deptId];

  if (!dept) {
    try {
      const res = await fetch(`data/${deptId}.json`);
      if (!res.ok) throw new Error(`${res.status}`);
      dept = await res.json();
      // cache in store
      const cache = store.get().deptCache || {};
      cache[deptId] = dept;
      store.set({ dept, deptCache: cache });
    } catch (err) {
      app.innerHTML = `<div class="container" style="padding-top:48px">
        <p class="text-muted">Could not load data for <strong>${deptId}</strong>. (${err.message})</p>
        <a href="#/">← Home</a></div>`;
      return;
    }
  } else {
    store.set({ dept });
  }

  const departments = store.get().departments;
  const deptMeta    = departments.find(d => d.id === deptId) || {};

  // Merge hasL1 from departments index into dept object
  const deptFull = { ...dept, hasL1: deptMeta.hasL1 ?? false };

  renderLayout(deptFull, view);
}

// ─── Nav definitions per role ──────────────────────────────────────────────
function navFor(dept, role) {
  const isFrozen = dept.frozen === true;
  if (role === 'L1') {
    return [
      { id: 'my',    label: 'My Day',          icon: '◎' },
      { id: 'kpi',   label: 'My Targets',      icon: '◆' },
      { id: 'solve', label: 'Problem-Solving', icon: '⚑' },
      { id: 'sop',   label: 'Standard Work',   icon: '≣' },
    ];
  }
  // L2
  return [
    { id: 'team',  label: 'Overview',        icon: '▤' },
    { id: 'kpi',   label: 'KPI Boards',      icon: '◆' },
    ...(!isFrozen ? [{ id: 'solve', label: 'Problem-Solving', icon: '⚑' }] : []),
    ...(!isFrozen ? [{ id: 'sop',   label: 'Standard Work',   icon: '≣' }] : []),
    { id: 'sources', label: 'Sources', icon: '⛁' },
  ];
}

function viewLabel(dept, role, view) {
  const item = navFor(dept, role).find(v => v.id === view);
  return item ? item.label : view;
}

// ─── Layout: dark command rail + light canvas + top bar ────────────────────
function renderLayout(dept, activeView) {
  const session = store.get().session;
  const persona = session.persona || resolvePersona(dept, session.role) || { name: dept.name, label: '' };
  const role    = session.role;
  const nav     = navFor(dept, role);

  const railLinks = nav.map(v => `
    <a href="#/dept/${dept.id}/${v.id}"
       class="rail-link ${activeView === v.id ? 'rail-link--active' : ''}">
      <span class="rail-link__icon">${v.icon}</span>${v.label}
    </a>`).join('');

  const roleBadgeClass = role === 'L1' ? 'role-badge role-badge--l1' : 'role-badge';
  const initials = persona.name.split(/[\s/]+/).filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();

  app.innerHTML = `
    <div class="app-shell">
      <nav class="rail">
        <div class="rail__brand">
          <div class="rail__mark">FM</div>
          <div class="rail__wordmark">FMDS OS<small>World Emblem</small></div>
        </div>

        <div class="rail__context">
          <div class="rail__ctx-label">Department</div>
          <div class="rail__ctx-dept">${dept.name}</div>
          <div class="rail__ctx-row">
            <span class="${roleBadgeClass}">${role}</span>
            <span class="rail__persona">${persona.name}</span>
          </div>
        </div>

        <div class="rail__nav">
          <div class="rail__nav-label">Resources</div>
          ${railLinks}
        </div>

        <div class="rail__footer">
          <div class="rail__footer-persona">
            <div class="rail__avatar">${initials}</div>
            <div class="rail__footer-meta">
              <div class="rail__footer-name">${persona.name}</div>
              <div class="rail__footer-sub">${persona.label || ''}</div>
            </div>
          </div>
          <button class="rail__signout" id="rail-signout">⤺ Switch role / Sign out</button>
        </div>
      </nav>

      <div class="app-main">
        <header class="topbar">
          <div class="crumb">
            <span class="crumb__dept">${dept.name}</span>
            <span class="crumb__sep">▸</span>
            <span class="crumb__view">${viewLabel(dept, role, activeView)}</span>
          </div>
          <button class="topbar-btn assistant-btn" id="assistant-btn" title="Mark — your AI employee">◇ Ask Mark</button>
          <button class="inbox-btn" id="inbox-btn" title="Chief of Staff inbox">
            🔔<span class="inbox-btn__count">2</span>
          </button>
          <div class="topbar__search">
            <input type="search" placeholder="Search this board…" aria-label="Search">
          </div>
          <span class="rollup-tag">▲ rolls up to <b>Leadership OS</b></span>
        </header>

        <main class="canvas">
          <div class="view-mount" id="view-mount"></div>
        </main>
      </div>
    </div>`;

  const mount = document.getElementById('view-mount');
  dispatchView(dept, activeView, mount);

  // Rail sign-out
  const signoutBtn = document.getElementById('rail-signout');
  if (signoutBtn) signoutBtn.addEventListener('click', signOut);

  // Chief-of-Staff inbox panel toggle
  const inboxBtn = document.getElementById('inbox-btn');
  if (inboxBtn) inboxBtn.addEventListener('click', () => toggleInbox(inboxBtn, dept));

  // AI Assistant drawer toggle
  const assistantBtn = document.getElementById('assistant-btn');
  if (assistantBtn) assistantBtn.addEventListener('click', () => toggleAssistant(dept));
}

// ─── Chief-of-Staff inbox panel ─────────────────────────────────────────────
function toggleInbox(anchor, dept) {
  const existing = document.getElementById('inbox-panel');
  if (existing) { existing.remove(); return; }
  const panel = document.createElement('div');
  panel.id = 'inbox-panel';
  panel.className = 'inbox-panel';
  panel.innerHTML = `
    <div class="inbox-panel__head">
      <div class="inbox-panel__title">Leadership OS · Chief of Staff</div>
      <div class="inbox-panel__sub">Requests context from ${dept.name}</div>
    </div>
    <div class="inbox-item">
      <span class="inbox-item__dot"></span>
      <div>
        <div class="inbox-item__body">Confirm the root cause on your red headline KPI before the Monday roll-up review.</div>
        <div class="inbox-item__from">Chief of Staff · due Mon 9:00</div>
      </div>
    </div>
    <div class="inbox-item">
      <span class="inbox-item__dot"></span>
      <div>
        <div class="inbox-item__body">Attach the governing standard work for this week's countermeasure.</div>
        <div class="inbox-item__from">Chief of Staff · this week</div>
      </div>
    </div>`;
  anchor.parentElement.appendChild(panel);
  // Dismiss on outside click
  setTimeout(() => {
    const onDoc = (e) => {
      if (!panel.contains(e.target) && e.target !== anchor) {
        panel.remove();
        document.removeEventListener('click', onDoc);
      }
    };
    document.addEventListener('click', onDoc);
  }, 0);
}

// ─── AI Assistant right drawer ──────────────────────────────────────────────
function toggleAssistant(dept) {
  const existing = document.getElementById('assistant-drawer');
  if (existing) { existing.remove(); return; }

  const pokeBtn = dept.id === 'hr'
    ? `<button class="assistant-shortcut assistant-shortcut--poke" data-intent="agent-poke">Ping Clarissa (ADP poke)</button>`
    : '';

  const drawer = document.createElement('div');
  drawer.id = 'assistant-drawer';
  drawer.className = 'assistant-drawer';
  drawer.innerHTML = `
    <div class="assistant-drawer__head">
      <div class="assistant-drawer__ident">
        <div class="assistant-drawer__avatar">M</div>
        <div>
          <div class="assistant-drawer__name">Mark</div>
          <div class="assistant-drawer__role">AI Employee · <span class="assistant-drawer__dept">${dept.name}</span></div>
        </div>
      </div>
      <button class="assistant-drawer__close" id="assistant-close">×</button>
    </div>

    <div class="assistant-drawer__reads">
      Mark reasons over your <b>KPI data</b> and the <b>meeting record</b> — weekly
      <b>T2</b> (leadership), <b>T3</b> (exec review) and team <b>huddles</b> — to explain
      what's driving each number and track the actions coming out of those meetings.
    </div>

    <div class="assistant-drawer__shortcuts">
      <button class="assistant-shortcut" data-intent="explain-red">Why is the headline KPI red?</button>
      <button class="assistant-shortcut" data-intent="find-sop">Find governing SOP</button>
      ${pokeBtn}
    </div>

    <div class="assistant-drawer__reply" id="assistant-reply"></div>

    <div class="assistant-drawer__ask">
      <textarea id="assistant-input" rows="3" placeholder="Ask about this board…"></textarea>
      <button class="btn btn--primary assistant-ask-btn" id="assistant-ask">Ask</button>
    </div>`;

  document.querySelector('.app-main').appendChild(drawer);

  // Close button
  document.getElementById('assistant-close').addEventListener('click', () => {
    document.getElementById('assistant-drawer')?.remove();
  });

  // Shortcut buttons
  document.querySelectorAll('.assistant-shortcut').forEach(btn => {
    btn.addEventListener('click', () => {
      const reply = bakedReply(dept.id, btn.dataset.intent, {});
      document.getElementById('assistant-reply').textContent = reply;
    });
  });

  // Ask button
  document.getElementById('assistant-ask').addEventListener('click', () => {
    const input = document.getElementById('assistant-input').value.trim();
    if (!input) return;
    const reply = bakedReply(dept.id, 'explain-red', { kpi: input });
    document.getElementById('assistant-reply').textContent = reply;
  });
}

// ─── View dispatcher ────────────────────────────────────────────────────────
function dispatchView(dept, view, mount) {
  const session = store.get().session;

  // ODG gets its dedicated method hub as the team view
  if (dept.id === 'odg' && view === 'team') {
    renderOdgHub(dept, mount);
    return;
  }

  switch (view) {
    // 'team' → Overview surface for all departments (role-scoped red/green summary + agent)
    case 'team':
      renderOverview(dept, mount, session);
      break;

    // 'kpi' → detailed KPI Boards:
    //   Operations → location board (Mechanism B) with operator contribution drill
    //   Others     → existing KPI view
    case 'kpi':
      dept.id === 'operations'
        ? renderLocationBoard(dept, mount)
        : renderKpi(dept, mount);
      break;

    case 'sources': renderSources(dept, mount); break;
    case 'my': {
      if (session && session.role === 'L1') {
        renderMyDay(dept, mount, session.persona);
      } else {
        renderMyBoard(dept, mount);
      }
      break;
    }
    case 'solve':
      renderProblemSolving(dept, mount);
      break;
    case 'sop':
      renderStandardWork(dept, mount);
      break;
    default:
      // ODG: fall back to method hub for unknown views too
      if (dept.id === 'odg') { renderOdgHub(dept, mount); return; }
      renderOverview(dept, mount, session);
  }
}


// ─── Init ───────────────────────────────────────────────────────────────────
addEventListener('hashchange', route);
boot();

;return {};
})();
</script>
